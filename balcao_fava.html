<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Balcão — Fava Ecom</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Arial,sans-serif;background:#f0f4f8;min-height:100vh}
.header{background:#1F3864;color:#fff;padding:10px 16px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.3)}
.header h1{font-size:14px;font-weight:700;flex:1}
.btn-hd{padding:5px 12px;border:none;border-radius:6px;cursor:pointer;font-size:12px;font-weight:700}
.btn-hd.verde{background:#22c55e;color:#fff}
.btn-hd.branco{background:#fff;color:#1F3864}
.tabs{background:#fff;border-bottom:2px solid #e2e8f0;display:flex}
.tab{padding:10px 20px;font-size:13px;font-weight:600;color:#64748b;cursor:pointer;border-bottom:3px solid transparent}
.tab.ativo{color:#1F3864;border-bottom-color:#1F3864}
.layout{display:grid;grid-template-columns:260px 1fr;height:calc(100vh - 88px);overflow:hidden}
.sidebar{background:#fff;border-right:2px solid #e2e8f0;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:10px}
.sec-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:#94a3b8;border-bottom:1px solid #f1f5f9;padding-bottom:4px;margin-bottom:6px}
.busca-wrap{display:flex;gap:4px}
.busca-input{flex:1;padding:8px 10px;border:2px solid #e2e8f0;border-radius:7px;font-size:13px;outline:none}
.busca-input:focus{border-color:#1F3864}
.btn-buscar{padding:8px 12px;background:#1F3864;color:#fff;border:none;border-radius:7px;cursor:pointer}
.busca-st{font-size:11px;min-height:16px;margin-top:3px}
.busca-st.ok{color:#16a34a}.busca-st.err{color:#dc2626}
.filtro-select{width:100%;border:1px solid #e2e8f0;border-radius:6px;padding:7px 8px;font-size:12px;outline:none;background:#fff}
.pgto-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:5px}
.pgto-btn{padding:8px 4px;border:2px solid #e2e8f0;border-radius:7px;background:#fff;cursor:pointer;text-align:center;font-size:10px;font-weight:700;color:#374151}
.pgto-btn.ativo{border-color:#1F3864;background:#eff6ff;color:#1F3864}
.pgto-btn .icon{font-size:18px;display:block;margin-bottom:2px}
.pgto-info{background:#f8fafc;border-radius:6px;padding:8px 10px;font-size:11px}
.field{margin-bottom:6px}
.field label{display:block;font-size:10px;font-weight:700;color:#64748b;margin-bottom:2px;text-transform:uppercase}
.field input,.field textarea{width:100%;border:1px solid #e2e8f0;border-radius:5px;padding:6px 8px;font-size:12px;outline:none}
.btn-acao{width:100%;padding:9px;border:none;border-radius:7px;cursor:pointer;font-size:12px;font-weight:700;margin-bottom:5px}
.btn-print{background:#0f766e;color:#fff}
.btn-clear{background:#f1f5f9;color:#64748b;border:1px solid #e2e8f0}
.main{overflow-y:auto;padding:12px;background:#f0f4f8}
.cat-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;flex-wrap:wrap;gap:8px}
.prod-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:8px}
.prod-card{background:#fff;border-radius:9px;border:1px solid #e2e8f0;padding:10px;cursor:pointer;position:relative}
.prod-card:hover{border-color:#1F3864;box-shadow:0 2px 8px rgba(31,56,100,.1)}
.prod-card.no-orc{border-color:#1F3864;background:#eff6ff}
.prod-sku{font-size:10px;font-weight:700;color:#1F3864}
.prod-nome{font-size:11px;font-weight:600;color:#1e293b;margin:3px 0;line-height:1.3;min-height:30px}
.prod-cat{font-size:9px;color:#94a3b8}
.prod-preco{font-size:17px;font-weight:700;color:#1F3864;margin-top:4px}
.prod-preco.pix{color:#16a34a}
.prod-preco-orig{font-size:10px;color:#94a3b8;text-decoration:line-through}
.prod-add{position:absolute;bottom:7px;right:7px;width:24px;height:24px;background:#1F3864;color:#fff;border:none;border-radius:50%;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;font-weight:700}
.prod-qtd-badge{position:absolute;top:5px;right:5px;background:#1F3864;color:#fff;border-radius:10px;padding:1px 6px;font-size:9px;font-weight:700}
.orc-item{background:#fff;border-radius:8px;border:1px solid #e2e8f0;padding:9px 11px;margin-bottom:7px;display:grid;grid-template-columns:1fr auto;gap:8px}
.qtd-ctrl{display:flex;align-items:center;gap:5px;margin-top:4px}
.qtd-btn{width:24px;height:24px;border:1px solid #e2e8f0;border-radius:5px;background:#f8fafc;cursor:pointer;font-size:14px;font-weight:700;display:flex;align-items:center;justify-content:center}
.qtd-num{font-size:13px;font-weight:700;min-width:20px;text-align:center}
.btn-remove{background:none;border:none;color:#cbd5e1;cursor:pointer;font-size:16px;padding:2px 4px}
.btn-remove:hover{color:#dc2626}
.totalizador{background:#1F3864;color:#fff;border-radius:10px;padding:14px;margin-top:10px}
.tot-linha{display:flex;justify-content:space-between;font-size:12px;padding:3px 0;border-bottom:1px solid rgba(255,255,255,.1)}
.tot-linha:last-child{border:none;font-size:17px;font-weight:700;padding-top:7px}
.vazio{text-align:center;padding:40px 20px;color:#94a3b8}
.spin{display:inline-block;width:12px;height:12px;border:2px solid #e2e8f0;border-top-color:#1F3864;border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
@media print{
  .sidebar,.tabs,.header .btn-hd,.pgto-grid,.field,.btn-acao,.busca-wrap,.filtro-select,.cat-header,.prod-grid,.qtd-ctrl,.btn-remove{display:none!important}
  .layout{display:block}.main{padding:0}body{background:#fff}
  .totalizador{background:#1F3864!important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
}
</style>
</head>
<body>

<div class="header">
  <span style="font-size:18px">&#127978;</span>
  <h1>Fava Ecom &mdash; Atendimento Balc&atilde;o</h1>
  <span id="hd-status" style="font-size:11px;color:#93c5fd;flex:1"></span>
  <button class="btn-hd branco" onclick="imprimirOrcamento()">&#128424; Imprimir</button>
  <button class="btn-hd verde" onclick="novoAtendimento()">+ Novo</button>
</div>

<div class="tabs">
  <div class="tab ativo" id="tab-cat" onclick="setTab('catalogo')">&#128230; Cat&aacute;logo</div>
  <div class="tab" id="tab-orc" onclick="setTab('orcamento')">&#128722; Or&ccedil;amento
    <span id="orc-badge" style="background:#1F3864;color:#fff;border-radius:10px;padding:1px 7px;font-size:10px;font-weight:700;margin-left:4px;display:none">0</span>
  </div>
</div>

<div class="layout">
  <div class="sidebar">
    <div>
      <div class="sec-label">Buscar produto</div>
      <div class="busca-wrap">
        <input type="text" id="busca-inp" class="busca-input" placeholder="SKU ou nome..." oninput="filtrar()">
        <button class="btn-buscar" onclick="filtrar()">&#128269;</button>
      </div>
      <div class="busca-st" id="busca-st"></div>
    </div>
    <div>
      <div class="sec-label">Fam&iacute;lia</div>
      <select class="filtro-select" id="filt-familia" onchange="filtrar()">
        <option value="">Todas as fam&iacute;lias</option>
        <option>ACESSÓRIOS PARA FERRAMENTAS</option>
        <option>AUTOMOTIVO</option>
        <option>BRINQUEDOS E RECREAÇÃO</option>
        <option>CAMPING PRAIA E LAZER</option>
        <option>ELETRODOMÉSTICOS E CLIMATIZAÇÃO</option>
        <option>ELETRONICOS ELETRICA E CABOS</option>
        <option>FERRAMENTAS</option>
        <option>FIXAÇÃO PNEUMÁTICA</option>
        <option>PEÇAS E MANUTENÇÃO GERAL</option>
        <option>PEÇAS MLP 750 LED</option>
        <option>PEÇAS MMA PRO 1000</option>
        <option>PEÇAS PARA BETONEIRAS</option>
        <option>PEÇAS PARA GUINCHOS E TALHAS</option>
        <option>PISCINAS E VERÃO</option>
        <option>UTILIDADES DOMÉSTICAS</option>
      </select>
    </div>
    <div>
      <div class="sec-label">Pagamento</div>
      <div class="pgto-grid">
        <button class="pgto-btn" id="btn-pix" onclick="setPgto('pix')">
          <span class="icon">&#128154;</span>PIX<div style="font-size:9px;color:#64748b">-10%</div>
        </button>
        <button class="pgto-btn ativo" id="btn-vista" onclick="setPgto('vista')">
          <span class="icon">&#128181;</span>Vista<div style="font-size:9px;color:#64748b">Normal</div>
        </button>
        <button class="pgto-btn" id="btn-cartao" onclick="setPgto('cartao')">
          <span class="icon">&#128179;</span>Cart&atilde;o<div style="font-size:9px;color:#64748b">3x s/j</div>
        </button>
      </div>
      <div class="pgto-info" id="pgto-info" style="margin-top:6px">Pre&ccedil;o cheio. Sem desconto.</div>
    </div>
    <div>
      <div class="sec-label">Cliente (opcional)</div>
      <div class="field"><label>Nome</label><input type="text" id="cli-nome" placeholder="Jo&atilde;o Silva"></div>
      <div class="field"><label>Telefone</label><input type="text" id="cli-fone" placeholder="(41) 9 9999-9999"></div>
      <div class="field"><label>Obs.</label><textarea id="cli-obs" rows="2" placeholder="Prazo, condi&ccedil;&otilde;es..."></textarea></div>
    </div>
    <div>
      <button class="btn-acao btn-print" onclick="imprimirOrcamento()">&#128424; Imprimir / Salvar PDF</button>
      <button class="btn-acao btn-clear" onclick="novoAtendimento()">&#128465; Limpar tudo</button>
    </div>
  </div>

  <div class="main">
    <div id="view-catalogo">
      <div class="cat-header">
        <div>
          <span id="cat-titulo" style="font-size:14px;font-weight:700;color:#1F3864">Todos os produtos</span>
          <span id="cat-count" style="font-size:12px;color:#64748b;margin-left:8px"></span>
        </div>
      </div>
      <div id="prod-grid-wrap">
        <div class="vazio"><div class="spin"></div><p>Carregando cat&aacute;logo...</p></div>
      </div>
    </div>
    <div id="view-orcamento" style="display:none">
      <div id="orc-lista-wrap">
        <div class="vazio"><p>Adicione produtos pelo cat&aacute;logo</p></div>
      </div>
      <div id="totalizador-wrap"></div>
    </div>
  </div>
</div>

<script>
const RAILWAY = 'https://web-production-5aa0f.up.railway.app';
const MARGEM  = 0.40;
const PIS_S   = 0.0165;
const COF_S   = 0.076;
const ICMS_PR = 0.195;
const DESC_PIX= 0.10;
const PARC_MAX= 3;
const PARC_MIN= 100;

let catalogo = [];
let filtrado = [];
let lista    = [];
let pgto     = 'vista';
let tabAtual = 'catalogo';

async function init(){
  const st = document.getElementById('hd-status');
  try{
    const r = await fetch(RAILWAY + '/api/db/produtos');
    if(!r.ok) throw new Error(r.status);
    const prods = await r.json();
    catalogo = prods
      .filter(function(p){ return p.sku && p.nome && (p.custo_pr || p.custo_br) > 0; })
      .map(function(p){
        return {
          sku:     String(p.sku).trim(),
          nome:    p.nome || '',
          familia: (p.familia || '').toUpperCase().trim(),
          cmv:     p.custo_pr || p.custo_br || 0,
        };
      });
    filtrado = catalogo.slice();
    st.textContent = catalogo.length + ' produtos carregados';
    filtrar();
    document.getElementById('busca-inp').focus();
  } catch(e) {
    st.textContent = 'Erro: ' + e.message;
    document.getElementById('prod-grid-wrap').innerHTML =
      '<div class="vazio"><p>Erro ao carregar: ' + e.message + '</p></div>';
  }
}

function setTab(t){
  tabAtual = t;
  document.getElementById('view-catalogo').style.display  = t === 'catalogo'  ? 'block' : 'none';
  document.getElementById('view-orcamento').style.display = t === 'orcamento' ? 'block' : 'none';
  document.getElementById('tab-cat').className = 'tab' + (t === 'catalogo'  ? ' ativo' : '');
  document.getElementById('tab-orc').className = 'tab' + (t === 'orcamento' ? ' ativo' : '');
  if(t === 'orcamento') renderOrcamento();
}

function filtrar(){
  var q   = (document.getElementById('busca-inp').value || '').toLowerCase().trim();
  var fam = (document.getElementById('filt-familia').value || '').toUpperCase().trim();
  filtrado = catalogo.filter(function(p){
    if(fam && p.familia !== fam) return false;
    if(q && p.sku.toLowerCase().indexOf(q) < 0 && p.nome.toLowerCase().indexOf(q) < 0) return false;
    return true;
  });
  document.getElementById('cat-titulo').textContent = document.getElementById('filt-familia').value || 'Todos os produtos';
  document.getElementById('cat-count').textContent  = filtrado.length + ' produto(s)';
  renderCatalogo();
}

function fmt(v){
  return (v || 0).toLocaleString('pt-BR', {minimumFractionDigits:2, maximumFractionDigits:2});
}

function calcPreco(cmv){
  var d = Math.max(1 - PIS_S - COF_S - ICMS_PR - MARGEM, 0.05);
  return cmv / d;
}

function precoFinal(pb){
  return pgto === 'pix' ? pb * (1 - DESC_PIX) : pb;
}

function calcParc(preco){
  var n = Math.min(PARC_MAX, Math.floor(preco / PARC_MIN));
  if(n < 2) return null;
  return {n: n, valor: preco / n};
}

function renderCatalogo(){
  var wrap = document.getElementById('prod-grid-wrap');
  if(!filtrado.length){
    wrap.innerHTML = '<div class="vazio"><p>Nenhum produto encontrado</p></div>';
    return;
  }
  var mostrar = filtrado.slice(0, 120);
  var html = '<div class="prod-grid">';
  for(var i = 0; i < mostrar.length; i++){
    var p = mostrar[i];
    var pb = calcPreco(p.cmv);
    var pf = precoFinal(pb);
    var noOrc = lista.filter(function(x){ return x.sku === p.sku; })[0];
    var temDesc = pgto === 'pix';
    html += '<div class="prod-card' + (noOrc ? ' no-orc' : '') + '" data-sku="' + p.sku + '">';
    if(noOrc) html += '<span class="prod-qtd-badge">' + noOrc.qtd + '</span>';
    html += '<div class="prod-sku">SKU ' + p.sku + '</div>';
    html += '<div class="prod-nome">' + p.nome.slice(0, 55) + (p.nome.length > 55 ? '...' : '') + '</div>';
    html += '<div class="prod-cat">' + p.familia + '</div>';
    if(temDesc) html += '<div class="prod-preco-orig">R$ ' + fmt(pb) + '</div>';
    html += '<div class="prod-preco' + (temDesc ? ' pix' : '') + '">R$ ' + fmt(pf) + '</div>';
    html += '<button class="prod-add" data-sku="' + p.sku + '">+</button>';
    html += '</div>';
  }
  html += '</div>';
  if(filtrado.length > 120){
    html += '<div style="text-align:center;padding:14px;color:#64748b;font-size:12px">Mostrando 120 de ' + filtrado.length + '. Use filtros para refinar.</div>';
  }
  wrap.innerHTML = html;
}

// Event delegation para cliques no catálogo
document.addEventListener('click', function(e){
  var card = e.target.closest('.prod-card');
  var btn  = e.target.closest('.prod-add');
  if(btn){
    e.stopPropagation();
    adicionarAoOrc(btn.dataset.sku);
    return;
  }
  if(card) adicionarAoOrc(card.dataset.sku);
});

document.addEventListener('click', function(e){
  var btnMenos = e.target.closest('.btn-menos');
  var btnMais  = e.target.closest('.btn-mais');
  var btnRem   = e.target.closest('.btn-remove');
  if(btnMenos){ alterarQtd(btnMenos.dataset.sku, -1); return; }
  if(btnMais){  alterarQtd(btnMais.dataset.sku,  +1); return; }
  if(btnRem){   removerItem(btnRem.dataset.sku);       return; }
});

function adicionarAoOrc(sku){
  var p = null;
  for(var i = 0; i < catalogo.length; i++){
    if(catalogo[i].sku === sku){ p = catalogo[i]; break; }
  }
  if(!p) return;
  var idx = -1;
  for(var j = 0; j < lista.length; j++){
    if(lista[j].sku === sku){ idx = j; break; }
  }
  if(idx >= 0){ lista[idx].qtd++; }
  else { lista.push({sku:p.sku, nome:p.nome, familia:p.familia, cmv:p.cmv, qtd:1}); }
  atualizarBadge();
  renderCatalogo();
  var st = document.getElementById('busca-st');
  st.textContent = 'Adicionado: ' + p.nome.slice(0, 30);
  st.className = 'busca-st ok';
  setTimeout(function(){ st.textContent = ''; }, 2000);
}

function alterarQtd(sku, delta){
  for(var i = 0; i < lista.length; i++){
    if(lista[i].sku === sku){
      lista[i].qtd = Math.max(1, lista[i].qtd + delta);
      break;
    }
  }
  renderOrcamento();
  renderCatalogo();
}

function removerItem(sku){
  lista = lista.filter(function(x){ return x.sku !== sku; });
  atualizarBadge();
  renderOrcamento();
  renderCatalogo();
}

function atualizarBadge(){
  var b = document.getElementById('orc-badge');
  if(lista.length){ b.textContent = lista.length; b.style.display = 'inline'; }
  else { b.style.display = 'none'; }
}

function renderOrcamento(){
  var wrap  = document.getElementById('orc-lista-wrap');
  var totWr = document.getElementById('totalizador-wrap');
  if(!lista.length){
    wrap.innerHTML  = '<div class="vazio"><p>Adicione produtos pelo cat&aacute;logo</p></div>';
    totWr.innerHTML = '';
    return;
  }
  var tot = 0;
  var html = '';
  for(var i = 0; i < lista.length; i++){
    var it = lista[i];
    var pb = calcPreco(it.cmv);
    var pf = precoFinal(pb);
    var total = pf * it.qtd;
    tot += total;
    var parc = pgto === 'cartao' ? calcParc(pf) : null;
    var temDesc = pgto === 'pix';
    html += '<div class="orc-item">';
    html += '<div>';
    html += '<div style="font-size:10px;font-weight:700;color:#1F3864">SKU ' + it.sku + '</div>';
    html += '<div style="font-size:12px;font-weight:600;color:#1e293b">' + it.nome.slice(0, 50) + '</div>';
    html += '<div class="qtd-ctrl">';
    html += '<button class="qtd-btn btn-menos" data-sku="' + it.sku + '">-</button>';
    html += '<span class="qtd-num">' + it.qtd + '</span>';
    html += '<button class="qtd-btn btn-mais" data-sku="' + it.sku + '">+</button>';
    html += '<button class="btn-remove" data-sku="' + it.sku + '">x</button>';
    html += '</div></div>';
    html += '<div style="text-align:right;min-width:90px">';
    if(temDesc) html += '<div style="font-size:10px;color:#94a3b8;text-decoration:line-through">R$ ' + fmt(pb) + '</div>';
    html += '<div style="font-size:15px;font-weight:700;color:' + (temDesc ? '#16a34a' : '#1F3864') + '">R$ ' + fmt(pf) + '</div>';
    html += '<div style="font-size:11px;color:#64748b">' + it.qtd + 'x R$ ' + fmt(pf) + '</div>';
    html += '<div style="font-size:13px;font-weight:700;color:#1F3864">R$ ' + fmt(total) + '</div>';
    if(parc) html += '<div style="font-size:10px;color:#64748b">' + parc.n + 'x R$ ' + fmt(parc.valor) + '</div>';
    html += '</div></div>';
  }
  wrap.innerHTML = html;

  var descTot = pgto === 'pix' ? tot / (1 - DESC_PIX) * DESC_PIX : 0;
  var parcG   = pgto === 'cartao' ? calcParc(tot) : null;
  var th = '<div class="totalizador">';
  if(pgto === 'pix'){
    th += '<div class="tot-linha"><span style="color:#93c5fd">Subtotal</span><span>R$ ' + fmt(tot / (1 - DESC_PIX)) + '</span></div>';
    th += '<div class="tot-linha"><span style="color:#86efac">PIX -10%</span><span style="color:#86efac">- R$ ' + fmt(descTot) + '</span></div>';
  }
  th += '<div class="tot-linha"><span style="font-size:15px">TOTAL ' + (pgto==='pix'?'PIX':pgto==='cartao'?'CART&Atilde;O':'&Agrave; VISTA') + '</span>';
  th += '<span style="font-size:18px;font-weight:700">R$ ' + fmt(tot) + '</span></div>';
  if(parcG) th += '<div style="text-align:center;font-size:10px;color:#93c5fd;background:rgba(255,255,255,.1);padding:5px;border-radius:5px;margin-top:7px">' + parcG.n + 'x de R$ ' + fmt(parcG.valor) + ' sem juros</div>';
  th += '</div>';
  totWr.innerHTML = th;
}

var PGTO_INFO = {
  pix:    'PIX &mdash; Desconto de <b>10%</b> autom&aacute;tico',
  vista:  'Pre&ccedil;o cheio. Dinheiro, d&eacute;bito.',
  cartao: 'Cart&atilde;o &mdash; <b>3x sem juros</b> (m&iacute;n. R$ 100/parcela)'
};
function setPgto(p){
  pgto = p;
  ['pix','vista','cartao'].forEach(function(k){
    document.getElementById('btn-' + k).classList.toggle('ativo', k === p);
  });
  document.getElementById('pgto-info').innerHTML = PGTO_INFO[p];
  renderCatalogo();
  if(tabAtual === 'orcamento') renderOrcamento();
}

function imprimirOrcamento(){
  if(!lista.length){ alert('Adicione produtos primeiro.'); return; }
  var cliente = document.getElementById('cli-nome').value.trim();
  var fone    = document.getElementById('cli-fone').value.trim();
  var obs     = document.getElementById('cli-obs').value.trim();
  var data    = new Date().toLocaleDateString('pt-BR');
  var hora    = new Date().toLocaleTimeString('pt-BR', {hour:'2-digit', minute:'2-digit'});
  var tot = 0;
  var linhas = '';
  for(var i = 0; i < lista.length; i++){
    var it = lista[i];
    var pb = calcPreco(it.cmv);
    var pf = precoFinal(pb);
    var total = pf * it.qtd;
    tot += total;
    var parc = pgto === 'cartao' ? calcParc(pf) : null;
    linhas += '<tr><td>' + it.sku + '</td><td>' + it.nome + '</td>';
    linhas += '<td style="text-align:center">' + it.qtd + '</td>';
    linhas += '<td style="text-align:right">R$ ' + fmt(pf) + '</td>';
    linhas += '<td style="text-align:right"><b>R$ ' + fmt(total) + '</b></td>';
    linhas += '<td style="text-align:center">' + (parc ? parc.n + 'x R$ ' + fmt(parc.valor) : '--') + '</td></tr>';
  }
  var descTot = pgto === 'pix' ? tot / (1 - DESC_PIX) * DESC_PIX : 0;
  var parcG   = pgto === 'cartao' ? calcParc(tot) : null;
  var pgtoLabel = pgto==='pix' ? 'PIX (10% desconto)' : pgto==='cartao' ? 'Cartao (3x sem juros)' : 'A vista';
  var w = window.open('', '_blank');
  w.document.write('<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><title>Orcamento Fava Ecom</title>');
  w.document.write('<style>body{font-family:Arial,sans-serif;padding:20px;font-size:12px;color:#1e293b}');
  w.document.write('h1{font-size:18px;color:#1F3864;margin-bottom:4px}.info{display:flex;justify-content:space-between;border-bottom:2px solid #1F3864;padding-bottom:8px;margin-bottom:14px}');
  w.document.write('.badge{display:inline-block;background:#1F3864;color:#fff;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;margin-bottom:10px}');
  w.document.write('table{width:100%;border-collapse:collapse;margin-bottom:14px}th{background:#1F3864;color:#fff;padding:7px 10px;text-align:left;font-size:10px;text-transform:uppercase}');
  w.document.write('td{padding:6px 10px;border-bottom:1px solid #e2e8f0}tr:nth-child(even) td{background:#f8fafc}');
  w.document.write('.totais{background:#f0f4f8;border-radius:8px;padding:12px;max-width:300px;margin-left:auto}');
  w.document.write('.tlin{display:flex;justify-content:space-between;padding:3px 0;font-size:12px}.tlin.grande{font-size:16px;font-weight:700;border-top:2px solid #1F3864;margin-top:6px;padding-top:6px;color:#1F3864}');
  w.document.write('.rodape{text-align:center;font-size:10px;color:#94a3b8;margin-top:20px;border-top:1px solid #e2e8f0;padding-top:8px}</style></head><body>');
  w.document.write('<h1>Fava Ecom</h1>');
  w.document.write('<div class="info"><div>' + (cliente ? '<b>' + cliente + '</b>' + (fone ? '<br>' + fone : '') : '') + '</div>');
  w.document.write('<div style="text-align:right"><b>Orcamento</b><br>' + data + ' ' + hora + '</div></div>');
  w.document.write('<span class="badge">' + pgtoLabel + '</span>');
  w.document.write('<table><thead><tr><th>SKU</th><th>Produto</th><th>Qtd</th><th>Preco</th><th>Total</th><th>Parcelas</th></tr></thead>');
  w.document.write('<tbody>' + linhas + '</tbody></table>');
  w.document.write('<div class="totais">');
  if(pgto === 'pix'){
    w.document.write('<div class="tlin"><span>Subtotal</span><span>R$ ' + fmt(tot/(1-DESC_PIX)) + '</span></div>');
    w.document.write('<div class="tlin" style="color:#16a34a"><span>PIX -10%</span><span>- R$ ' + fmt(descTot) + '</span></div>');
  }
  w.document.write('<div class="tlin grande"><span>TOTAL</span><span>R$ ' + fmt(tot) + '</span></div>');
  if(parcG) w.document.write('<div class="tlin" style="color:#1d4ed8"><span>Parcelamento</span><span>' + parcG.n + 'x R$ ' + fmt(parcG.valor) + '</span></div>');
  w.document.write('</div>');
  if(obs) w.document.write('<div style="font-size:11px;color:#64748b;border-top:1px solid #e2e8f0;padding-top:8px;margin-top:8px">' + obs + '</div>');
  w.document.write('<div class="rodape">FV Comercio e Servicos Ltda - Valido por 5 dias uteis</div>');
  w.document.write('<scr' + 'ipt>window.onload=function(){window.print();}</' + 'script>');
  w.document.write('</body></html>');
  w.document.close();
}

function novoAtendimento(){
  if(lista.length && !confirm('Limpar atendimento atual?')) return;
  lista = []; pgto = 'vista';
  ['cli-nome','cli-fone','cli-obs'].forEach(function(id){
    var el = document.getElementById(id); if(el) el.value = '';
  });
  document.getElementById('busca-inp').value = '';
  setPgto('vista');
  atualizarBadge();
  renderCatalogo();
  setTab('catalogo');
}

init();
</script>
</body>
</html>
