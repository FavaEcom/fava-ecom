<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Base de Produtos — Fava Ecom</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#0f172a;color:#e2e8f0;min-height:100vh;font-size:12px}
nav{background:#1e293b;padding:6px 16px;display:flex;gap:8px;align-items:center;border-bottom:1px solid #334155;position:sticky;top:0;z-index:50;height:40px;flex-wrap:wrap}
nav a{color:#94a3b8;text-decoration:none;font-size:11px;font-weight:600;padding:4px 8px;border-radius:6px;white-space:nowrap}
nav a:hover,nav a.ativo{background:#3b82f6;color:#fff}
.toolbar{padding:10px 16px;display:flex;gap:8px;align-items:center;flex-wrap:wrap;background:#1e293b;border-bottom:1px solid #334155;position:sticky;top:40px;z-index:40}
.toolbar input{background:#0f172a;border:1px solid #475569;border-radius:6px;color:#f1f5f9;padding:6px 10px;font-size:12px;width:220px}
.toolbar input:focus{outline:none;border-color:#3b82f6}
.toolbar select{background:#0f172a;border:1px solid #475569;border-radius:6px;color:#f1f5f9;padding:6px 10px;font-size:12px}
.info{font-size:11px;color:#64748b;margin-left:auto}
.badge{padding:2px 8px;border-radius:4px;font-size:10px;font-weight:700;background:#1e3a5f;color:#93c5fd}
.tbl-wrap{overflow:auto;height:calc(100vh - 90px)}
table{width:100%;border-collapse:collapse;min-width:1400px}
thead th{background:#1a2335;padding:7px 8px;text-align:left;font-size:10px;font-weight:700;color:#94a3b8;text-transform:uppercase;border-bottom:2px solid #334155;white-space:nowrap;position:sticky;top:0;z-index:10;cursor:pointer;user-select:none}
thead th:hover{color:#e2e8f0}
thead th.sorted{color:#3b82f6}
thead th .num{text-align:right}
tbody tr{border-bottom:1px solid #0f172a;transition:background .1s}
tbody tr:hover{background:#1a2231}
td{padding:5px 8px;vertical-align:middle;max-width:200px}
.sku-tag{font-family:monospace;font-weight:700;color:#60a5fa;font-size:11px}
.nome-cell{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:500;max-width:180px}
.num-cell{text-align:right;font-family:monospace;font-size:11px}
.fam-badge{display:inline-block;padding:1px 6px;border-radius:3px;font-size:10px;background:#1e293b;color:#94a3b8;border:1px solid #334155}
/* Edição inline */
td.editavel{cursor:pointer}
td.editavel:hover{background:#1a3a5c}
td.editavel:hover::after{content:'✎';color:#3b82f6;margin-left:4px;font-size:10px}
input.cell-edit{background:#0f172a;border:1px solid #3b82f6;border-radius:4px;color:#f1f5f9;padding:3px 6px;font-size:11px;width:100%;outline:none}
input.cell-edit.salvo{border-color:#22c55e;background:#071411}
/* Tags ST/IMP */
.tag-st{background:#78350f;color:#fcd34d;padding:1px 5px;border-radius:3px;font-size:9px;font-weight:700}
.tag-ok{background:#14532d;color:#86efac;padding:1px 5px;border-radius:3px;font-size:9px}
.tag-0{color:#475569;font-size:11px}
/* Toast */
.toast{position:fixed;bottom:20px;right:20px;background:#166534;color:#86efac;padding:8px 16px;border-radius:7px;font-size:12px;font-weight:700;z-index:200;display:none;max-width:350px}
.loading{text-align:center;padding:40px;color:#475569}
</style>
</head>
<body>
<nav>
  <a href="/painel_fava.html">🏠 Painel</a>
  <a href="/entrada_nf.html">📄 Entrada NF</a>
  <a href="/historico_compras.html">🔍 Histórico</a>
  <a href="/base_produtos.html">📦 Base</a>
  <a href="/gestor_anuncios.html">📢 Anúncios</a>
  <a href="/fila_anuncios.html">🤖 Fila IA</a>
  <a href="/calculadora_fava.html">💰 Calculadora</a>
  <a href="/balcao_fava.html">🏪 Balcão</a>
  <a href="/ean.html">🏷️ EAN</a>
  <a href="/tarefas.html">📋 Tarefas</a>
  <a href="/estoque_parado.html">📦 Estoque</a>
</nav>
<div class="toolbar">
  <input id="busca" type="text" placeholder="Buscar SKU ou nome..." oninput="filtrar()">
  <select id="filtro-fam" onchange="filtrar()">
    <option value="">Todas as famílias</option>
  </select>
  <select id="filtro-pend" onchange="filtrar()">
    <option value="">Todos</option>
    <option value="sem-peso">Sem peso</option>
    <option value="sem-ncm">Sem NCM</option>
    <option value="sem-familia">Sem família</option>
    <option value="sem-cmv">Sem CMV</option>
    <option value="sem-ean">Sem EAN</option>
  </select>
  <span class="badge" id="badge-count">—</span>
  <span class="info">Duplo clique numa célula para editar · Enter salva · Esc cancela</span>
</div>
<div class="tbl-wrap">
  <div id="conteudo" class="loading">⏳ Carregando...</div>
</div>
<div class="toast" id="toast"></div>

<script>
var _todos = [], _filtrados = [];
var _sortCol = 'sku', _sortAsc = true;

function toast(msg, ok) {
  var el = document.getElementById('toast');
  el.textContent = msg;
  el.style.background = ok===false ? '#7f1d1d' : '#166534';
  el.style.display = 'block';
  setTimeout(()=>el.style.display='none', 2500);
}

// Carregar produtos
fetch('/api/db/produtos?limit=5000')
  .then(r=>r.json())
  .then(data=>{
    _todos = data;
    // Popular famílias
    var fams = [...new Set(data.map(d=>d.familia||'').filter(Boolean))].sort();
    var sel = document.getElementById('filtro-fam');
    fams.forEach(f=>{var o=document.createElement('option');o.value=f;o.textContent=f;sel.appendChild(o);});
    filtrar();
  })
  .catch(e=>document.getElementById('conteudo').innerHTML='Erro: '+e.message);

function filtrar() {
  var busca = document.getElementById('busca').value.toLowerCase();
  var fam   = document.getElementById('filtro-fam').value;
  var pend  = document.getElementById('filtro-pend').value;
  _filtrados = _todos.filter(function(p){
    if(busca && !p.sku.toLowerCase().includes(busca) && !(p.nome||'').toLowerCase().includes(busca)) return false;
    if(fam && p.familia !== fam) return false;
    if(pend==='sem-peso'    && (p.peso||0)>0) return false;
    if(pend==='sem-ncm'     && p.ncm) return false;
    if(pend==='sem-familia' && p.familia) return false;
    if(pend==='sem-cmv'     && (p.custo_br||0)>0) return false;
    if(pend==='sem-ean'     && p.ean) return false;
    return true;
  });
  ordenar();
}

function ordenar() {
  var col = _sortCol;
  _filtrados.sort(function(a,b){
    var va = a[col]||0, vb = b[col]||0;
    if(typeof va==='string') { va=va.toLowerCase(); vb=(vb||'').toLowerCase(); }
    if(va<vb) return _sortAsc?-1:1;
    if(va>vb) return _sortAsc?1:-1;
    return 0;
  });
  renderTabela();
}

function setSort(col) {
  if(_sortCol===col) _sortAsc=!_sortAsc; else { _sortCol=col; _sortAsc=true; }
  document.querySelectorAll('thead th').forEach(t=>t.classList.remove('sorted'));
  var th = document.getElementById('th-'+col);
  if(th) th.classList.add('sorted');
  ordenar();
}

function renderTabela() {
  document.getElementById('badge-count').textContent = _filtrados.length+' produtos';
  var html = '<table><thead><tr>';
  var cols = [
    {k:'sku',    l:'SKU',      ed:false},
    {k:'nome',   l:'Nome',     ed:true},
    {k:'familia',l:'Família',  ed:true},
    {k:'custo_br',l:'CMV BR',  ed:true, num:true},
    {k:'custo_pr',l:'CMV PR',  ed:true, num:true},
    {k:'peso',   l:'Peso(kg)', ed:true, num:true},
    {k:'largura',l:'Larg',     ed:true, num:true},
    {k:'altura', l:'Alt',      ed:true, num:true},
    {k:'comprimento',l:'Prof', ed:true, num:true},
    {k:'ncm',    l:'NCM',      ed:true},
    {k:'cest',   l:'CEST',     ed:true},
    {k:'cst_padrao',l:'CST',   ed:true},
    {k:'tem_st', l:'ST',       ed:true},
    {k:'ipi',    l:'IPI%',     ed:true, num:true},
    {k:'ean',    l:'EAN',      ed:true},
    {k:'origem', l:'Orig',     ed:true},
    {k:'estoque',l:'Estq',     ed:false, num:true},
  ];
  cols.forEach(function(c){
    html += '<th id="th-'+c.k+'" onclick="setSort(\''+c.k+'\')"'+(c.num?' class="num"':'')+'>'+c.l+'</th>';
  });
  html += '</tr></thead><tbody>';

  _filtrados.forEach(function(p, i){
    html += '<tr id="tr-'+p.sku.replace(/[^a-z0-9]/gi,'_')+'">';
    cols.forEach(function(col){
      var v = p[col.k];
      var display = '';
      // Formatação por campo
      if(col.k==='sku') {
        display = '<span class="sku-tag">'+esc(p.sku)+'</span>';
      } else if(col.k==='nome') {
        display = '<div class="nome-cell" title="'+esc(v||'')+'">'+esc((v||'—').slice(0,40))+'</div>';
      } else if(col.k==='familia') {
        display = v ? '<span class="fam-badge">'+esc(v)+'</span>' : '<span class="tag-0">—</span>';
      } else if(col.k==='custo_br'||col.k==='custo_pr') {
        display = v&&v>0 ? '<span style="color:#22c55e">R$ '+Number(v).toFixed(4)+'</span>' : '<span class="tag-0">—</span>';
      } else if(col.k==='peso'||col.k==='largura'||col.k==='altura'||col.k==='comprimento') {
        display = v&&v>0 ? '<span style="color:#f1f5f9">'+Number(v).toFixed(3)+'</span>' : '<span class="tag-0">—</span>';
      } else if(col.k==='tem_st') {
        display = v&&parseInt(v)>0 ? '<span class="tag-st">SIM</span>' : '<span class="tag-0">não</span>';
      } else if(col.k==='ipi') {
        display = v&&v>0 ? Number(v).toFixed(1)+'%' : '<span class="tag-0">—</span>';
      } else if(col.k==='estoque') {
        display = '<span style="color:'+(v>0?'#22c55e':'#ef4444')+'">'+( v||0)+'</span>';
      } else {
        display = v ? esc(String(v)) : '<span class="tag-0">—</span>';
      }

      if(col.ed) {
        html += '<td class="editavel'+(col.num?' num-cell':'')+'" ondblclick="editarCelula(this,\''+esc(p.sku)+'\',\''+col.k+'\',\''+esc(String(v||''))+'\')" data-sku="'+esc(p.sku)+'" data-campo="'+col.k+'" data-val="'+esc(String(v||''))+'">'+display+'</td>';
      } else {
        html += '<td'+(col.num?' class="num-cell"':'')+'>'+display+'</td>';
      }
    });
    html += '</tr>';
  });
  html += '</tbody></table>';
  document.getElementById('conteudo').innerHTML = html;
}

function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// Edição inline
var _celAtual = null;

function editarCelula(td, sku, campo, valorAtual) {
  if(_celAtual) cancelarEdicao();
  _celAtual = td;
  var input = document.createElement('input');
  input.className = 'cell-edit';
  input.value = valorAtual==='null'||valorAtual==='undefined'||valorAtual==='—'?'':valorAtual;
  input.dataset.sku = sku;
  input.dataset.campo = campo;
  input.dataset.original = td.innerHTML;
  td.innerHTML = '';
  td.appendChild(input);
  input.focus();
  input.select();
  input.addEventListener('keydown', function(e){
    if(e.key==='Enter'){salvarCelula(td, input, sku, campo);}
    if(e.key==='Escape'){cancelarEdicao();}
    e.stopPropagation();
  });
  input.addEventListener('blur', function(){
    // Delay para não conflitar com click em outro campo
    setTimeout(function(){if(_celAtual===td) cancelarEdicao();}, 200);
  });
}

function cancelarEdicao() {
  if(!_celAtual) return;
  var inp = _celAtual.querySelector('input');
  if(inp) _celAtual.innerHTML = inp.dataset.original;
  _celAtual = null;
}

function salvarCelula(td, input, sku, campo) {
  var val = input.value.trim();
  // Converter para número se necessário
  var numCampos = ['peso','largura','altura','comprimento','custo_br','custo_pr','custo','ipi','st_imposto'];
  var payload = {sku: sku};
  payload[campo] = numCampos.includes(campo) ? (parseFloat(val)||0) : val;

  fetch('/api/db/produto', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify(payload)
  }).then(r=>r.json()).then(d=>{
    if(d.ok){
      input.className = 'cell-edit salvo';
      // Atualizar dado local
      var prod = _todos.find(p=>p.sku===sku);
      if(prod) {
        prod[campo] = payload[campo];
        // Re-render só essa linha
        setTimeout(function(){
          filtrar();
          toast('✓ '+sku+' — '+campo+' salvo');
        }, 300);
      }
    }
  }).catch(()=>toast('Erro ao salvar', false));
  _celAtual = null;
}

// Atalho: Tab avança para próxima célula editável
document.addEventListener('keydown', function(e){
  if(e.key==='Tab' && _celAtual){
    e.preventDefault();
    // Avançar para próxima célula editável na mesma linha
    var tds = Array.from(_celAtual.parentElement.querySelectorAll('td.editavel'));
    var idx  = tds.indexOf(_celAtual);
    if(idx >= 0 && idx < tds.length-1) {
      var next = tds[idx+1];
      setTimeout(function(){
        next.dispatchEvent(new MouseEvent('dblclick'));
      }, 10);
    }
  }
});
</script>
</body>
</html>
