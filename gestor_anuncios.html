<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gestor de Anúncios — Fava Ecom</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Arial,sans-serif;background:#f0f4f8;min-height:100vh}
.header{background:#1F3864;color:#fff;padding:12px 20px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.3)}
.header h1{font-size:15px;font-weight:700;flex:1}
.hd-status{font-size:11px;color:#93c5fd}
.main{max-width:1200px;margin:0 auto;padding:20px 16px}
.busca-card{background:#fff;border-radius:12px;border:1px solid #e2e8f0;padding:20px;margin-bottom:20px}
.busca-titulo{font-size:14px;font-weight:700;color:#1F3864;margin-bottom:14px}
.busca-wrap{display:flex;gap:10px;flex-wrap:wrap}
.busca-input{flex:1;min-width:200px;padding:10px 14px;border:2px solid #e2e8f0;border-radius:8px;font-size:14px;outline:none;transition:.2s}
.busca-input:focus{border-color:#1F3864}
.btn{padding:10px 20px;border:none;border-radius:8px;cursor:pointer;font-size:13px;font-weight:700;transition:.15s}
.btn-azul{background:#1F3864;color:#fff}
.btn-azul:hover{background:#1e3a8a}
.btn-verde{background:#16a34a;color:#fff}
.btn-cinza{background:#f1f5f9;color:#374151;border:1px solid #e2e8f0}
.produto-header{background:linear-gradient(135deg,#1F3864,#2563eb);color:#fff;border-radius:12px;padding:16px 20px;margin-bottom:16px;display:none}
.prod-nome{font-size:16px;font-weight:700;margin-bottom:4px}
.prod-sku{font-size:12px;color:#93c5fd}
.prod-kpis{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;margin-top:12px}
.kpi{background:rgba(255,255,255,.12);border-radius:8px;padding:10px 12px}
.kpi-label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:#93c5fd;margin-bottom:4px}
.kpi-value{font-size:18px;font-weight:700}
.kpi-sub{font-size:10px;color:#bfdbfe;margin-top:2px}
.canais-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:14px;margin-bottom:20px}
.canal-card{background:#fff;border-radius:12px;border:1px solid #e2e8f0;overflow:hidden}
.canal-head{padding:12px 16px;display:flex;align-items:center;gap:8px;border-bottom:1px solid #f1f5f9}
.canal-head h3{font-size:13px;font-weight:700;color:#1F3864;flex:1}
.canal-badge{padding:2px 8px;border-radius:10px;font-size:10px;font-weight:700}
.badge-ml{background:#ffe8cc;color:#92400e}
.badge-shopee{background:#fee2e2;color:#dc2626}
.badge-yampi{background:#dbeafe;color:#1d4ed8}
.badge-classico{background:#f3f4f6;color:#374151}
.badge-premium{background:#fef3c7;color:#92400e}
.canal-body{padding:14px 16px}
.metricas{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:12px}
.metrica{text-align:center;background:#f8fafc;border-radius:6px;padding:8px}
.metrica-valor{font-size:16px;font-weight:700;color:#1F3864}
.metrica-label{font-size:9px;color:#94a3b8;text-transform:uppercase;letter-spacing:.3px;margin-top:2px}
.metrica-valor.verde{color:#16a34a}
.metrica-valor.vermelho{color:#dc2626}
.metrica-valor.amarelo{color:#d97706}
.decomp{font-size:11px;border-top:1px solid #f1f5f9;padding-top:10px;margin-top:10px}
.decomp-linha{display:flex;justify-content:space-between;padding:2px 0;color:#64748b}
.decomp-linha.destaque{color:#1e293b;font-weight:700;border-top:1px solid #e2e8f0;margin-top:4px;padding-top:4px}
.decomp-linha.negativo{color:#dc2626}
.desconto-wrap{background:#eff6ff;border-radius:8px;padding:10px 12px;margin-top:10px}
.desconto-label{font-size:10px;font-weight:700;color:#1d4ed8;margin-bottom:6px;text-transform:uppercase}
.desconto-row{display:flex;align-items:center;gap:8px}
.desconto-row input[type=range]{flex:1;accent-color:#1F3864}
.desconto-val{font-size:13px;font-weight:700;color:#1F3864;min-width:40px;text-align:center}
.preco-com-desc{font-size:11px;color:#64748b;margin-top:4px}
.canal-acoes{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap}
.btn-sm{padding:5px 12px;font-size:11px;font-weight:700;border:none;border-radius:6px;cursor:pointer}
.btn-sm-azul{background:#1F3864;color:#fff}
.btn-sm-verde{background:#16a34a;color:#fff}
.btn-sm-amarelo{background:#d97706;color:#fff}
.btn-sm-cinza{background:#f1f5f9;color:#374151;border:1px solid #e2e8f0}
.novo-anuncio-card{background:#fff;border-radius:12px;border:2px dashed #e2e8f0;padding:20px;margin-bottom:20px;display:none}
.novo-anuncio-card.show{display:block}
.novo-titulo{font-size:13px;font-weight:700;color:#1F3864;margin-bottom:14px}
.form-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px}
.field{display:flex;flex-direction:column;gap:4px}
.field label{font-size:10px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:.4px}
.field input,.field select{border:1px solid #e2e8f0;border-radius:6px;padding:7px 10px;font-size:13px;outline:none}
.field input:focus,.field select:focus{border-color:#1F3864}
.field.full{grid-column:1/-1}
.empty{text-align:center;padding:50px 20px;color:#94a3b8}
.empty .icon{font-size:48px;margin-bottom:12px}
.status-msg{padding:8px 12px;border-radius:6px;font-size:12px;font-weight:600;margin-bottom:12px;display:none}
.status-msg.ok{background:#dcfce7;color:#166534;display:block}
.status-msg.err{background:#fee2e2;color:#dc2626;display:block}
.status-msg.info{background:#dbeafe;color:#1d4ed8;display:block}
.spin{display:inline-block;width:16px;height:16px;border:2px solid #e2e8f0;border-top-color:#1F3864;border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
/* Badge salvo */
.desc-salvo{display:inline-block;padding:2px 6px;border-radius:4px;font-size:9px;font-weight:700;background:#dcfce7;color:#166534;margin-left:6px;vertical-align:middle}
</style>
</head>
<body>

<div class="header">
  <span style="font-size:20px">📢</span>
  <h1>Gestor de Anúncios — Fava Ecom</h1>
  <span class="hd-status" id="hd-status">Carregando...</span>
</div>

<div class="main">

  <div class="busca-card">
    <div class="busca-titulo">🔍 Buscar produto por SKU ou nome</div>
    <div class="busca-wrap">
      <input type="text" id="busca-input" class="busca-input"
        placeholder="Digite o SKU (ex: 1562) ou nome do produto..."
        onkeydown="if(event.key==='Enter') buscar()">
      <button class="btn btn-azul" onclick="buscar()">🔍 Buscar</button>
      <button class="btn btn-verde" onclick="toggleNovoAnuncio()" id="btn-novo">+ Novo Anúncio</button>
      <button class="btn btn-cinza" onclick="limpar()">✕ Limpar</button>
    </div>
    <div id="sugestoes-wrap" style="margin-top:8px"></div>
  </div>

  <div class="status-msg" id="st-main"></div>

  <div class="produto-header" id="prod-header">
    <div class="prod-nome" id="prod-nome"></div>
    <div class="prod-sku" id="prod-sku-info"></div>
    <div class="prod-kpis" id="prod-kpis"></div>
  </div>

  <div class="novo-anuncio-card" id="novo-anuncio-card">
    <div class="novo-titulo">➕ Adicionar anúncio</div>
    <div class="form-grid">
      <div class="field"><label>Canal</label>
        <select id="novo-canal">
          <option value="ml">Mercado Livre</option>
          <option value="shopee">Shopee</option>
          <option value="yampi">Yampi</option>
        </select>
      </div>
      <div class="field"><label>ID do anúncio (MLB/URL)</label>
        <input type="text" id="novo-id" placeholder="MLB1234567890">
      </div>
      <div class="field"><label>Tipo</label>
        <select id="novo-tipo">
          <option value="gold_special">Clássico</option>
          <option value="gold_pro">Premium</option>
        </select>
      </div>
      <div class="field"><label>Tipo de frete</label>
        <select id="novo-frete-tipo">
          <option value="taxa_fixa">Taxa Fixa</option>
          <option value="rapido">Frete Rápido</option>
          <option value="gratis">Grátis</option>
        </select>
      </div>
      <div class="field"><label>Preço de venda (R$)</label>
        <input type="number" id="novo-preco" step="0.01" placeholder="0,00">
      </div>
      <div class="field"><label>Frete médio (R$)</label>
        <input type="number" id="novo-frete-val" step="0.01" placeholder="0,00">
      </div>
      <div class="field"><label>Taxa (%)</label>
        <input type="number" id="novo-taxa" step="0.01" value="12" placeholder="12">
      </div>
      <div class="field"><label>Desconto atual (%)</label>
        <input type="number" id="novo-desc" step="1" value="0" min="0" max="80">
      </div>
      <div class="field full"><label>Título do anúncio</label>
        <input type="text" id="novo-titulo" placeholder="Título do anúncio...">
      </div>
    </div>
    <div style="display:flex;gap:8px;margin-top:12px">
      <button class="btn btn-verde" onclick="salvarNovoAnuncio()">💾 Salvar anúncio</button>
      <button class="btn btn-cinza" onclick="toggleNovoAnuncio()">Cancelar</button>
    </div>
  </div>

  <div id="kits-alerta-wrap"></div>
  <div id="canais-wrap">
    <div class="empty">
      <div class="icon">📢</div>
      <p>Digite um SKU ou nome para ver os anúncios</p>
    </div>
  </div>

</div>

<script>
const RAILWAY = 'https://web-production-5aa0f.up.railway.app';

const PIS_S = 0.0165, COF_S = 0.076, DIFAL_MED = 0.0381, IBS_CBS = 0.02;
const ICMS_SAIDA_MED = 0.12;

let todosAnuncios = [];
let todosProdutos = [];
let prodAtual    = null;
let anunciosProd = [];

// Mapa de dados dos cards para recálculo: idx → {preco, cmvBr, taxa, frete}
const _cardDados = {};

async function init(){
  const st = document.getElementById('hd-status');
  try{
    const [rAn, rPr] = await Promise.all([
      fetch(RAILWAY + '/api/db/listings').then(r => r.ok ? r.json() : []),
      fetch(RAILWAY + '/api/db/produtos').then(r => r.ok ? r.json() : []),
    ]);
    todosAnuncios = rAn || [];
    todosProdutos = rPr || [];
    st.textContent = `✅ ${todosAnuncios.length} anúncios | ${todosProdutos.length} produtos`;
    document.getElementById('busca-input').focus();
  } catch(e){
    st.textContent = '❌ ' + e.message;
  }
}

function buscar(){
  const q = document.getElementById('busca-input').value.trim();
  if(!q) return;
  const sku = q.replace(/^0+/, '');
  let prod = todosProdutos.find(p => String(p.sku).trim() === sku);
  if(!prod && isNaN(parseInt(q))){
    prod = todosProdutos.find(p => (p.nome||'').toLowerCase().includes(q.toLowerCase()));
  }
  if(!prod){
    const anSkuMatch = todosAnuncios.find(a => String(a.sku||'').trim() === sku);
    if(anSkuMatch){
      prod = {sku: anSkuMatch.sku, nome: anSkuMatch.titulo||anSkuMatch.sku,
              custo_br: anSkuMatch.cmv||0, custo_pr: anSkuMatch.cmv_pr||0};
    }
  }
  if(!prod){ mostrarStatus('st-main', `❌ SKU/produto "${q}" não encontrado`, 'err'); return; }

  prodAtual = prod;
  mostrarStatus('st-main','','');
  const skuProd = String(prod.sku).trim();
  anunciosProd = todosAnuncios.filter(a => String(a.sku||'').trim() === skuProd);
  renderProdHeader();
  renderCanais();
  verificarKits(skuProd);
}

function buscarRapido(sku){
  document.getElementById('busca-input').value = sku;
  buscar();
}

let kitsDoComponente = [];
async function verificarKits(sku){
  const wrap = document.getElementById('kits-alerta-wrap');
  if(wrap) wrap.innerHTML = '';
  kitsDoComponente = [];
  try{
    const r = await fetch(RAILWAY + '/api/db/kits-mapa?sku=' + encodeURIComponent(sku));
    if(!r.ok) return;
    const d = await r.json();
    if(!d.data || !d.data.length) return;
    kitsDoComponente = d.data;
  } catch(e){}
}

function renderProdHeader(){
  const p = prodAtual;
  const cmvBr = p.custo_br || p.custo || 0;
  const cmvPr = p.custo_pr || cmvBr;
  document.getElementById('prod-nome').textContent = p.nome || 'Produto ' + p.sku;
  document.getElementById('prod-sku-info').textContent =
    `SKU ${p.sku} | ${anunciosProd.length} anúncio(s) encontrado(s)`;
  const precos = anunciosProd.filter(a => a.preco > 0).map(a => a.preco);
  const precoMin = precos.length ? Math.min(...precos) : 0;
  const precoMax = precos.length ? Math.max(...precos) : 0;
  // Calcular margem média real
  const margens = anunciosProd.map(a => calcMargem(a.preco, cmvBr, a.sale_fee||0.12, a.frete_medio||0, (a.desconto||0)/100));
  const mgMedia = margens.length ? margens.reduce((s,v)=>s+v,0)/margens.length : 0;

  document.getElementById('prod-kpis').innerHTML = `
    <div class="kpi"><div class="kpi-label">CMV Brasil</div><div class="kpi-value">R$ ${fmt(cmvBr)}</div><div class="kpi-sub">Gerencial/Marketplaces</div></div>
    <div class="kpi"><div class="kpi-label">CMV Paraná</div><div class="kpi-value">R$ ${fmt(cmvPr)}</div><div class="kpi-sub">Balcão/Local</div></div>
    <div class="kpi"><div class="kpi-label">Margem média</div><div class="kpi-value">${(mgMedia*100).toFixed(1)}%</div><div class="kpi-sub">Nos anúncios</div></div>
    <div class="kpi"><div class="kpi-label">Preços</div><div class="kpi-value">R$ ${fmt(precoMin)}</div><div class="kpi-sub">até R$ ${fmt(precoMax)}</div></div>
    <div class="kpi"><div class="kpi-label">Anúncios</div><div class="kpi-value">${anunciosProd.length}</div><div class="kpi-sub">ML + Shopee + Yampi</div></div>
  `;
  document.getElementById('prod-header').style.display = 'block';
}

// Função centralizada de cálculo de margem
function calcMargem(preco, cmvBr, taxa, frete, descPct){
  const pv = preco * (1 - descPct);
  const difal = DIFAL_MED + IBS_CBS;
  const lucro = pv - cmvBr - pv*taxa - pv*PIS_S - pv*COF_S - pv*ICMS_SAIDA_MED - pv*difal - frete;
  const margem = pv > 0 ? lucro / pv : 0;
  return margem;
}

function renderCanais(){
  const wrap = document.getElementById('canais-wrap');
  const cmvBr = prodAtual?.custo_br || prodAtual?.custo || 0;
  if(!anunciosProd.length && !kitsDoComponente.length){
    wrap.innerHTML = `<div class="empty"><div class="icon">📭</div>
      <p>Nenhum anúncio encontrado para SKU ${prodAtual?.sku}</p>
      <p style="margin-top:8px;font-size:12px">Clique em <b>+ Novo Anúncio</b> para adicionar</p></div>`;
    return;
  }
  let html = '';
  if(anunciosProd.length){
    html += `<div style="font-size:12px;font-weight:700;color:#64748b;text-transform:uppercase;
      letter-spacing:.5px;margin-bottom:10px;padding-left:4px">
      📦 Anúncios diretos — SKU ${prodAtual?.sku} (${anunciosProd.length})</div>`;
    html += `<div class="canais-grid" style="margin-bottom:24px">
      ${anunciosProd.map((a,i) => renderCardAnuncio(a, 'd'+i, cmvBr)).join('')}</div>`;
  }
  renderKitsSecao(html, cmvBr, wrap);
}

async function renderKitsSecao(htmlBase, cmvBr, wrap){
  const skuProd = String(prodAtual?.sku||'').trim();
  if(!kitsDoComponente.length){
    try{
      const r = await fetch(RAILWAY+'/api/db/kits-mapa?sku='+encodeURIComponent(skuProd));
      if(r.ok){ const d=await r.json(); kitsDoComponente=d.data||[]; }
    }catch(e){}
  }
  let html = htmlBase;
  if(kitsDoComponente.length){
    const skusKits = [...new Set(kitsDoComponente.map(k=>k.sku_kit))];
    const anunciosKits = todosAnuncios.filter(a => skusKits.includes(String(a.sku||'').trim()));
    html += `<div style="border-top:2px solid #e2e8f0;padding-top:16px;margin-top:4px">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px">
        <span style="font-size:12px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:.5px">
          🔗 Kits que contêm SKU ${skuProd} (${skusKits.length} kits)</span></div>`;
    if(anunciosKits.length){
      html += skusKits.map(skuKit => {
        const ansKit = anunciosKits.filter(a => String(a.sku||'').trim() === skuKit);
        if(!ansKit.length) return '';
        const comp = kitsDoComponente.find(k=>k.sku_kit===skuKit);
        const cmvKit = ansKit[0]?.cmv || 0;
        return `<div style="margin-bottom:16px">
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;
            background:#f0f4ff;border-radius:8px;padding:8px 12px">
            <span style="font-size:11px;font-weight:700;color:#1F3864">Kit: ${skuKit}</span>
            <span style="font-size:10px;color:#64748b">${comp?`SKU ${skuProd} × ${comp.qtd}x`:''}</span>
            <span style="font-size:10px;color:#64748b;margin-left:auto">${ansKit.length} anúncio(s)</span></div>
          <div class="canais-grid">
            ${ansKit.map((a,i)=>renderCardAnuncio(a,'k'+skuKit.replace(/[^a-z0-9]/gi,'')+i,cmvKit||cmvBr)).join('')}
          </div></div>`;
      }).join('');
    }
    html += '</div>';
  }
  wrap.innerHTML = html;
}

function detectarCanal(a){
  const id = String(a.id||'');
  if(id.startsWith('MLB')) return 'ml';
  return a.canal || 'ml';
}

function renderCardAnuncio(a, idx, cmvBr){
  const preco   = parseFloat(a.preco||0);
  const taxa    = parseFloat(a.sale_fee||0.12);
  const frete   = parseFloat(a.frete_medio||0);
  const difal   = DIFAL_MED + IBS_CBS;
  // ── desconto salvo no banco (em %) ──
  const descPct = parseFloat(a.desconto||0);
  const desc    = descPct / 100;
  const pv      = preco * (1 - desc);

  // Guardar dados do card para recálculo no slider
  _cardDados[idx] = {preco, cmvBr, taxa, frete};

  // Decomposição
  const taxaR  = pv * taxa;
  const pisR   = pv * PIS_S;
  const cofR   = pv * COF_S;
  const icmsR  = pv * ICMS_SAIDA_MED;
  const difalR = pv * difal;
  const lucro  = pv - cmvBr - taxaR - pisR - cofR - icmsR - difalR - frete;
  const mg     = pv > 0 ? lucro / pv : 0;

  // Ponto zero
  const denom0  = Math.max(1 - taxa - PIS_S - COF_S - ICMS_SAIDA_MED - difal, 0.05);
  const zero    = (cmvBr + frete) / denom0;
  // Desc máx (margem mín 15%)
  const denom15 = Math.max(denom0 - 0.15, 0.05);
  const preco15 = (cmvBr + frete) / denom15;
  const descMax = preco > 0 ? Math.max(0, (1 - preco15/preco) * 100) : 0;

  const isPrem  = (a.listing_type||'').includes('gold_pro') || (a.listing_type||'').includes('premium');
  const canal   = detectarCanal(a);
  const mcCls   = mg >= 0.20 ? 'verde' : mg >= 0.10 ? 'amarelo' : 'vermelho';
  const lucroCls= lucro >= 0 ? 'verde' : 'vermelho';

  const badgeCanal = canal==='shopee'
    ? '<span class="canal-badge badge-shopee">🛍️ Shopee</span>'
    : canal==='yampi'
    ? '<span class="canal-badge badge-yampi">🌐 Yampi</span>'
    : '<span class="canal-badge badge-ml">🛒 ML</span>';
  const badgeTipo = isPrem
    ? '<span class="canal-badge badge-premium">⭐ Premium</span>'
    : '<span class="canal-badge badge-classico">📦 Clássico</span>';

  // Badge "desconto salvo" se tiver desconto > 0
  const badgeDesc = descPct > 0
    ? `<span class="desc-salvo">💾 ${descPct}% salvo</span>` : '';

  return `<div class="canal-card">
    <div class="canal-head">
      ${badgeCanal} ${badgeTipo}
      <div style="flex:1;min-width:0">
        <div style="font-size:11px;font-weight:700;color:#1F3864">${a.id||'—'}${badgeDesc}</div>
        <div style="font-size:10px;color:#94a3b8;margin-top:1px">SKU ${a.sku||'—'}</div>
      </div>
      <span style="font-size:10px;color:#94a3b8">${a.status||''}</span>
    </div>
    <div class="canal-body">
      <div style="font-size:12px;color:#374151;margin-bottom:10px;font-weight:600;line-height:1.3">
        ${(a.titulo||'').slice(0,70)}${(a.titulo||'').length>70?'...':''}
      </div>

      <!-- ── Métricas com IDs para atualizar em tempo real ── -->
      <div class="metricas">
        <div class="metrica">
          <div class="metrica-valor" id="mv-preco-${idx}">R$ ${fmt(pv)}</div>
          <div class="metrica-label" id="mv-preco-label-${idx}">Preço${desc>0?' c/desc':''}</div>
        </div>
        <div class="metrica">
          <div class="metrica-valor ${mcCls}" id="mv-mg-${idx}">${(mg*100).toFixed(1)}%</div>
          <div class="metrica-label">Margem real</div>
        </div>
        <div class="metrica">
          <div class="metrica-valor ${lucroCls}" id="mv-lucro-${idx}">R$ ${fmt(lucro)}</div>
          <div class="metrica-label">Lucro</div>
        </div>
      </div>

      <!-- Decomposição com IDs -->
      <div class="decomp">
        <div class="decomp-linha"><span>CMV Brasil</span><span>R$ ${fmt(cmvBr)}</span></div>
        <div class="decomp-linha negativo"><span>Taxa ML (${(taxa*100).toFixed(0)}%)</span><span id="dc-taxa-${idx}">- R$ ${fmt(taxaR)}</span></div>
        <div class="decomp-linha negativo"><span>Frete</span><span>- R$ ${fmt(frete)}</span></div>
        <div class="decomp-linha negativo"><span>PIS+COFINS</span><span id="dc-pc-${idx}">- R$ ${fmt(pisR+cofR)}</span></div>
        <div class="decomp-linha negativo"><span>ICMS saída (12%)</span><span id="dc-icms-${idx}">- R$ ${fmt(icmsR)}</span></div>
        <div class="decomp-linha negativo"><span>DIFAL+IBS (${(difal*100).toFixed(1)}%)</span><span id="dc-difal-${idx}">- R$ ${fmt(difalR)}</span></div>
        <div class="decomp-linha destaque"><span>= Lucro</span>
          <span id="dc-lucro-${idx}" style="color:${lucro>=0?'#16a34a':'#dc2626'}">R$ ${fmt(lucro)}</span></div>
        <div class="decomp-linha" style="color:#94a3b8;font-size:10px;margin-top:4px">
          <span>Ponto zero (margem 0)</span><span>R$ ${fmt(zero)}</span></div>
        <div class="decomp-linha" style="color:#94a3b8;font-size:10px">
          <span>Desc. máx (mg 15%)</span><span>${descMax.toFixed(1)}%</span></div>
      </div>

      <!-- Desconto -->
      <div class="desconto-wrap">
        <div class="desconto-label">Desconto ativo: <span id="desc-val-${idx}">${descPct.toFixed(0)}%</span></div>
        <div class="desconto-row">
          <input type="range" id="slider-${idx}"
            min="0" max="${Math.min(descMax+5,50).toFixed(0)}" step="1"
            value="${descPct.toFixed(0)}"
            oninput="atualizarDesconto('${idx}', this.value)">
          <span class="desconto-val" id="desc-inp-${idx}">${descPct.toFixed(0)}%</span>
        </div>
        <div class="preco-com-desc" id="desc-preco-${idx}">
          Preço c/ desc: <b>R$ ${fmt(pv)}</b> |
          Lucro: <b>R$ ${fmt(lucro)}</b> |
          Margem: <b style="color:${mcCls==='verde'?'#16a34a':mcCls==='amarelo'?'#d97706':'#dc2626'}">${(mg*100).toFixed(1)}%</b>
        </div>
      </div>


      <!-- ── Yampi: dados ao vivo + edição ── -->
      ${canal === 'yampi' ? renderYampiExtra(idx, a.id) : ''}

            <!-- Ações -->
      <div class="canal-acoes">
        ${canal==='ml'?`<a href="https://www.mercadolivre.com.br/anuncios/${a.id}" target="_blank" class="btn-sm btn-sm-azul">🔗 Abrir ML</a>`:''}
        <button class="btn-sm btn-sm-verde" onclick="salvarDesconto('${a.id}', '${idx}')">💾 Salvar desconto</button>
        <button class="btn-sm btn-sm-cinza" onclick="copiarId('${a.id}')">📋 Copiar ID</button>
      </div>
    </div>
  </div>`;
}

// ══ DESCONTO — recalcula tudo em tempo real ══
function atualizarDesconto(idx, pctStr){
  const pct  = parseFloat(pctStr) || 0;
  const d    = _cardDados[idx];
  if(!d) return;

  const desc  = pct / 100;
  const pv    = d.preco * (1 - desc);
  const difal = DIFAL_MED + IBS_CBS;
  const taxaR = pv * d.taxa;
  const pisR  = pv * PIS_S;
  const cofR  = pv * COF_S;
  const icmsR = pv * ICMS_SAIDA_MED;
  const difalR= pv * difal;
  const lucro = pv - d.cmvBr - taxaR - pisR - cofR - icmsR - difalR - d.frete;
  const mg    = pv > 0 ? lucro / pv : 0;
  const mcCls = mg >= 0.20 ? '#16a34a' : mg >= 0.10 ? '#d97706' : '#dc2626';
  const lCls  = lucro >= 0 ? '#16a34a' : '#dc2626';

  // Atualiza label %
  const eVal = document.getElementById(`desc-val-${idx}`);
  const eInp = document.getElementById(`desc-inp-${idx}`);
  if(eVal) eVal.textContent = pct + '%';
  if(eInp) eInp.textContent = pct + '%';

  // ── Atualiza as 3 caixas de métricas ──
  const ePreco = document.getElementById(`mv-preco-${idx}`);
  const eMg    = document.getElementById(`mv-mg-${idx}`);
  const eLucro = document.getElementById(`mv-lucro-${idx}`);
  const eLbl   = document.getElementById(`mv-preco-label-${idx}`);
  if(ePreco) ePreco.textContent = 'R$ ' + fmt(pv);
  if(eLbl)   eLbl.textContent   = pct > 0 ? 'Preço c/desc' : 'Preço venda';
  if(eMg){   eMg.textContent = (mg*100).toFixed(1) + '%';
             eMg.style.color = mcCls; }
  if(eLucro){ eLucro.textContent = 'R$ ' + fmt(lucro);
              eLucro.style.color = lCls; }

  // ── Atualiza decomposição ──
  const set = (id, v) => { const e=document.getElementById(id); if(e) e.textContent=v; };
  set(`dc-taxa-${idx}`,  `- R$ ${fmt(taxaR)}`);
  set(`dc-pc-${idx}`,    `- R$ ${fmt(pisR+cofR)}`);
  set(`dc-icms-${idx}`,  `- R$ ${fmt(icmsR)}`);
  set(`dc-difal-${idx}`, `- R$ ${fmt(difalR)}`);
  const eDcLucro = document.getElementById(`dc-lucro-${idx}`);
  if(eDcLucro){ eDcLucro.textContent = `R$ ${fmt(lucro)}`; eDcLucro.style.color = lCls; }

  // ── Atualiza linha de resumo embaixo ──
  const ePrecoDesc = document.getElementById(`desc-preco-${idx}`);
  if(ePrecoDesc) ePrecoDesc.innerHTML =
    `Preço c/ desc: <b>R$ ${fmt(pv)}</b> | Lucro: <b>R$ ${fmt(lucro)}</b> | Margem: <b style="color:${mcCls}">${(mg*100).toFixed(1)}%</b>`;
}

// ══ SALVAR DESCONTO no banco ══
async function salvarDesconto(mlbId, idx){
  const slider = document.getElementById(`slider-${idx}`);
  const pct = slider ? parseFloat(slider.value) : 0;
  mostrarStatus('st-main', `💾 Salvando desconto ${pct}% para ${mlbId}...`, 'info');
  try{
    const r = await fetch(RAILWAY + '/api/db/listing', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({id: mlbId, desconto: pct})
    });
    if(!r.ok) throw new Error(r.status);
    // Atualiza local (para persistir sem recarregar)
    const an = todosAnuncios.find(a => a.id === mlbId);
    if(an) an.desconto = pct;
    const an2 = anunciosProd.find(a => a.id === mlbId);
    if(an2) an2.desconto = pct;
    // Mostra badge "salvo" no cabeçalho do card
    const cardHead = slider?.closest('.canal-card')?.querySelector('.canal-head .metrica-valor, .canal-head div');
    mostrarStatus('st-main', `✅ Desconto ${pct}% salvo para ${mlbId}`, 'ok');
  } catch(e){
    mostrarStatus('st-main', '❌ Erro: ' + e.message, 'err');
  }
}

// ══ NOVO ANÚNCIO ══
function toggleNovoAnuncio(){
  const card = document.getElementById('novo-anuncio-card');
  card.classList.toggle('show');
  if(card.classList.contains('show') && prodAtual)
    document.getElementById('novo-titulo').value = prodAtual.nome || '';
}

async function salvarNovoAnuncio(){
  const canal  = document.getElementById('novo-canal').value;
  const id     = document.getElementById('novo-id').value.trim();
  const tipo   = document.getElementById('novo-tipo').value;
  const fTipo  = document.getElementById('novo-frete-tipo').value;
  const preco  = parseFloat(document.getElementById('novo-preco').value)||0;
  const frete  = parseFloat(document.getElementById('novo-frete-val').value)||0;
  const taxa   = parseFloat(document.getElementById('novo-taxa').value)||12;
  const desc   = parseFloat(document.getElementById('novo-desc').value)||0;
  const titulo = document.getElementById('novo-titulo').value.trim();
  if(!id || !preco){ alert('ID e preço são obrigatórios.'); return; }
  const payload = {
    id, sku: prodAtual?.sku||'', titulo, preco, frete_medio: frete,
    sale_fee: taxa/100, listing_type: tipo,
    free_shipping: fTipo==='gratis' ? 1 : 0,
    status: 'active', desconto: desc, canal,
    cmv: prodAtual?.custo_br || 0,
  };
  try{
    const r = await fetch(RAILWAY+'/api/db/listing',{
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify(payload)
    });
    if(!r.ok) throw new Error(r.status);
    anunciosProd.push({...payload, margem_minima:0});
    todosAnuncios.push({...payload});
    toggleNovoAnuncio();
    renderCanais();
    if(prodAtual) renderProdHeader();
    mostrarStatus('st-main', `✅ Anúncio ${id} salvo!`, 'ok');
  } catch(e){
    mostrarStatus('st-main', '❌ Erro: ' + e.message, 'err');
  }
}

function fmt(v){ return (v||0).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2}); }
function mostrarStatus(id, msg, tipo){
  const el = document.getElementById(id);
  if(!el) return;
  el.textContent = msg; el.className = 'status-msg' + (tipo?' '+tipo:'');
  if(tipo==='ok') setTimeout(()=>el.className='status-msg',4000);
}
function copiarId(id){
  navigator.clipboard.writeText(id).then(()=>{ mostrarStatus('st-main',`📋 "${id}" copiado!`,'ok'); });
}
function limpar(){
  prodAtual=null; anunciosProd=[];
  document.getElementById('busca-input').value='';
  document.getElementById('prod-header').style.display='none';
  document.getElementById('canais-wrap').innerHTML=
    '<div class="empty"><div class="icon">📢</div><p>Digite um SKU ou nome para ver os anúncios</p></div>';
  mostrarStatus('st-main','','');
}

document.addEventListener('DOMContentLoaded', ()=>{
  const inp = document.getElementById('busca-input');
  inp.addEventListener('input', ()=>{
    const q = inp.value.trim().toLowerCase();
    if(q.length < 2){ document.getElementById('sugestoes-wrap').innerHTML=''; return; }
    const matches = todosProdutos
      .filter(p => String(p.sku).includes(q) || (p.nome||'').toLowerCase().includes(q))
      .slice(0,6);
    if(!matches.length){ document.getElementById('sugestoes-wrap').innerHTML=''; return; }
    document.getElementById('sugestoes-wrap').innerHTML =
      '<div style="display:flex;gap:6px;flex-wrap:wrap">' +
      matches.map(p=>`<button onclick="buscarRapido('${p.sku}')"
        style="padding:4px 10px;background:#eff6ff;color:#1d4ed8;border:1px solid #bfdbfe;
        border-radius:6px;cursor:pointer;font-size:11px;font-weight:600">
        SKU ${p.sku} — ${(p.nome||'').slice(0,30)}</button>`).join('')+'</div>';
  });
});


// ══ YAMPI — dados ao vivo + edição ══

function renderYampiExtra(idx, yampiId){
  const skuId = String(yampiId||'').replace('YMP','');
  return `
    <div class="yampi-box" id="yampi-box-${idx}" style="background:#f0fdf4;border:1px solid #bbf7d0;
      border-radius:8px;padding:10px 12px;margin-top:10px">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
        <span style="font-size:10px;font-weight:700;color:#166534;text-transform:uppercase">🌐 Yampi — Dados reais</span>
        <button onclick="carregarYampi('${skuId}','${idx}')"
          style="padding:2px 8px;background:#dcfce7;color:#166534;border:1px solid #86efac;
          border-radius:4px;font-size:10px;font-weight:700;cursor:pointer">🔄 Carregar</button>
        <span id="yampi-status-${idx}" style="font-size:10px;color:#64748b"></span>
      </div>
      <div id="yampi-dados-${idx}" style="font-size:11px;color:#475569">
        Clique em Carregar para buscar dados da Yampi
      </div>
    </div>`;
}

async function carregarYampi(skuId, idx){
  const elStatus = document.getElementById(`yampi-status-${idx}`);
  const elDados  = document.getElementById(`yampi-dados-${idx}`);
  if(!elStatus || !elDados) return;
  elStatus.textContent = '⏳ Buscando...';
  try{
    // Busca SKU
    const rSku = await fetch(`${RAILWAY}/api/yampi/catalog/skus/${skuId}?skipCache=true`);
    if(!rSku.ok) throw new Error('SKU ' + rSku.status);
    const dSku = await rSku.json();
    const s = dSku.data;
    if(!s){ elStatus.textContent = '❌ SKU não encontrado'; return; }

    // Busca produto (para frete customizado)
    const rProd = await fetch(`${RAILWAY}/api/yampi/catalog/products/${s.product_id}?skipCache=true`);
    const dProd = rProd.ok ? await rProd.json() : {};
    const p = dProd.data || {};

    elStatus.textContent = '✅ Atualizado';
    const hasCustShip = p.has_custom_shipping;
    const shipVal     = p.shipping_value || 0;

    elDados.innerHTML = `
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:10px">
        <div style="background:#fff;border-radius:6px;padding:6px 8px;border:1px solid #e2e8f0">
          <div style="font-size:9px;color:#94a3b8;text-transform:uppercase">Preço venda</div>
          <div style="font-size:14px;font-weight:700;color:#1F3864">R$ ${fmtBR(s.price_sale)}</div>
        </div>
        <div style="background:#fff;border-radius:6px;padding:6px 8px;border:1px solid #e2e8f0">
          <div style="font-size:9px;color:#94a3b8;text-transform:uppercase">Preço promo</div>
          <div style="font-size:14px;font-weight:700;color:${s.price_discount>0?'#16a34a':'#94a3b8'}">
            ${s.price_discount>0?'R$ '+fmtBR(s.price_discount):'—'}
          </div>
        </div>
        <div style="background:#fff;border-radius:6px;padding:6px 8px;border:1px solid #e2e8f0">
          <div style="font-size:9px;color:#94a3b8;text-transform:uppercase">Estoque</div>
          <div style="font-size:14px;font-weight:700;color:${s.total_in_stock>5?'#16a34a':s.total_in_stock>0?'#d97706':'#dc2626'}">
            ${s.total_in_stock} un
          </div>
        </div>
      </div>

      <!-- Editar preço -->
      <div style="background:#fff;border-radius:6px;padding:8px 10px;border:1px solid #e2e8f0;margin-bottom:6px">
        <div style="font-size:9px;font-weight:700;color:#475569;text-transform:uppercase;margin-bottom:6px">✏️ Editar preço</div>
        <div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap">
          <div>
            <div style="font-size:9px;color:#94a3b8">Preço venda (R$)</div>
            <input type="number" id="yampi-preco-${idx}" step="0.01"
              value="${s.price_sale}"
              style="width:90px;padding:4px 6px;border:1px solid #e2e8f0;border-radius:4px;font-size:12px">
          </div>
          <div>
            <div style="font-size:9px;color:#94a3b8">Promo (R$, 0=sem)</div>
            <input type="number" id="yampi-promo-${idx}" step="0.01"
              value="${s.price_discount||0}"
              style="width:90px;padding:4px 6px;border:1px solid #e2e8f0;border-radius:4px;font-size:12px">
          </div>
          <button onclick="salvarPrecoYampi('${skuId}','${s.product_id}','${idx}')"
            style="padding:5px 12px;background:#16a34a;color:#fff;border:none;border-radius:6px;
            font-size:11px;font-weight:700;cursor:pointer;margin-top:10px">💾 Salvar preço</button>
        </div>
      </div>

      <!-- Frete customizado -->
      <div style="background:#fff;border-radius:6px;padding:8px 10px;border:1px solid #e2e8f0">
        <div style="font-size:9px;font-weight:700;color:#475569;text-transform:uppercase;margin-bottom:6px">
          🚚 Frete customizado — ${hasCustShip?'Ativo (R$ '+fmtBR(shipVal)+')':'Desativado (usa frete padrão)'}
        </div>
        <div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap">
          <select id="yampi-frete-tipo-${idx}"
            style="padding:4px 6px;border:1px solid #e2e8f0;border-radius:4px;font-size:11px">
            <option value="none" ${!hasCustShip?'selected':''}>Frete padrão (sem customizar)</option>
            <option value="fixed" ${hasCustShip&&shipVal>0?'selected':''}>Frete fixo (R$)</option>
            <option value="free" ${hasCustShip&&shipVal===0?'selected':''}>Frete grátis</option>
          </select>
          <input type="number" id="yampi-frete-val-${idx}" step="0.01"
            value="${shipVal}" placeholder="Valor R$"
            style="width:80px;padding:4px 6px;border:1px solid #e2e8f0;border-radius:4px;font-size:11px">
          <button onclick="salvarFreteYampi('${s.product_id}','${idx}')"
            style="padding:5px 12px;background:#1F3864;color:#fff;border:none;border-radius:6px;
            font-size:11px;font-weight:700;cursor:pointer">💾 Salvar frete</button>
        </div>
      </div>
    `;
  } catch(e){
    elStatus.textContent = '❌ Erro: ' + e.message;
  }
}

async function salvarPrecoYampi(skuId, productId, idx){
  const novoPreco = parseFloat(document.getElementById(`yampi-preco-${idx}`)?.value||0);
  const novoPromo = parseFloat(document.getElementById(`yampi-promo-${idx}`)?.value||0);
  if(!novoPreco){ alert('Preço inválido'); return; }
  const elStatus = document.getElementById(`yampi-status-${idx}`);
  if(elStatus) elStatus.textContent = '💾 Salvando...';
  try{
    const payload = {price_sale: novoPreco};
    if(novoPromo > 0) payload.price_discount = novoPromo;
    const r = await fetch(`${RAILWAY}/api/yampi/catalog/skus/${skuId}`, {
      method: 'PUT',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify(payload)
    });
    if(!r.ok){ const e=await r.json(); throw new Error(JSON.stringify(e)); }
    if(elStatus) elStatus.textContent = `✅ Preço R$ ${novoPreco.toFixed(2)} salvo!`;
    mostrarStatus('st-main', `✅ Yampi: preço R$ ${novoPreco.toFixed(2)} atualizado`, 'ok');
  } catch(e){
    if(elStatus) elStatus.textContent = '❌ Erro';
    mostrarStatus('st-main', '❌ Yampi erro: ' + e.message, 'err');
  }
}

async function salvarFreteYampi(productId, idx){
  const tipo = document.getElementById(`yampi-frete-tipo-${idx}`)?.value;
  const val  = parseFloat(document.getElementById(`yampi-frete-val-${idx}`)?.value||0);
  const elStatus = document.getElementById(`yampi-status-${idx}`);
  if(elStatus) elStatus.textContent = '💾 Salvando frete...';

  let payload = {};
  if(tipo === 'none'){
    payload = {has_custom_shipping: false};
  } else if(tipo === 'free'){
    payload = {has_custom_shipping: true, shipping_value: 0};
  } else {
    payload = {has_custom_shipping: true, shipping_value: val};
  }

  try{
    const r = await fetch(`${RAILWAY}/api/yampi/catalog/products/${productId}`, {
      method: 'PUT',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify(payload)
    });
    if(!r.ok){ const e=await r.json(); throw new Error(JSON.stringify(e)); }
    if(elStatus) elStatus.textContent = `✅ Frete salvo!`;
    mostrarStatus('st-main', '✅ Yampi: frete atualizado', 'ok');
  } catch(e){
    if(elStatus) elStatus.textContent = '❌ Erro frete';
    mostrarStatus('st-main', '❌ Yampi frete erro: ' + e.message, 'err');
  }
}

function fmtBR(v){ return (v||0).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2}); }

init();
