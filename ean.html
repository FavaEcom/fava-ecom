<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Gerador EAN-13 — Fava Ecom</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#0f172a;color:#e2e8f0;min-height:100vh}
nav{background:#1e293b;padding:10px 20px;display:flex;gap:16px;align-items:center;border-bottom:1px solid #334155}
nav a{color:#94a3b8;text-decoration:none;font-size:13px;font-weight:600;padding:6px 12px;border-radius:6px}
nav a:hover,nav a.ativo{background:#3b82f6;color:#fff}
.main{max-width:600px;margin:32px auto;padding:0 16px}
h1{font-size:18px;margin-bottom:24px;color:#f1f5f9}
.card{background:#1e293b;border-radius:12px;padding:24px;border:1px solid #334155}
label{font-size:12px;color:#94a3b8;display:block;margin-bottom:6px;font-weight:600}
input{width:100%;padding:10px 14px;border-radius:8px;border:1px solid #475569;background:#0f172a;color:#f1f5f9;font-size:15px;margin-bottom:16px}
input:focus{outline:none;border-color:#3b82f6}
button{width:100%;padding:12px;background:#3b82f6;color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:700;cursor:pointer}
button:hover{background:#2563eb}
#resultado{text-align:center;font-size:36px;font-weight:700;letter-spacing:8px;color:#3b82f6;margin:20px 0 4px;min-height:48px}
#copiado{text-align:center;font-size:13px;color:#22c55e;min-height:20px;margin-bottom:16px}
.historico-titulo{font-size:12px;color:#94a3b8;font-weight:600;margin:24px 0 10px}
.item{background:#0f172a;border-radius:8px;padding:10px 14px;display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;border:1px solid #334155}
.item .ean{font-size:16px;font-weight:700;letter-spacing:3px}
.item .info{font-size:11px;color:#64748b}
</style>
</head>
<body>
<nav>
  <a href="/painel_fava.html">🏠 Painel</a>
  <a href="/ean.html" class="ativo">🔢 EAN</a>
  <a href="/tarefas.html">📋 Tarefas</a>
  <a href="/base_produtos.html">📦 Base</a>
</nav>
<div class="main">
  <h1>🔢 Gerador EAN-13</h1>
  <div class="card">
    <label>Prefixo da empresa (7 dígitos)</label>
    <input id="prefixo" type="text" maxlength="7" placeholder="7891234" oninput="this.value=this.value.replace(/[^0-9]/g,'')">
    <label>SKU do produto</label>
    <input id="sku" type="text" placeholder="1562" oninput="this.value=this.value.replace(/[^0-9]/g,'')">
    <button onclick="gerar()">Gerar EAN-13</button>
    <div id="resultado"></div>
    <div id="copiado"></div>
    <div class="historico-titulo">HISTÓRICO</div>
    <div id="historico"></div>
  </div>
</div>
<script>
function gerar() {
  var pref = document.getElementById('prefixo').value.replace(/[^0-9]/g,'');
  var skuVal = document.getElementById('sku').value.replace(/[^0-9]/g,'');
  if (pref.length !== 7) { alert('Prefixo deve ter exatamente 7 dígitos'); return; }
  var sku5 = ('00000' + skuVal).slice(-5);
  var doze = pref + sku5;
  var s = 0;
  for (var i = 0; i < 12; i++) s += parseInt(doze[i]) * (i % 2 === 0 ? 1 : 3);
  var dig = (10 - (s % 10)) % 10;
  var ean = doze + String(dig);
  document.getElementById('resultado').textContent = ean;
  var cp = document.getElementById('copiado');
  if (navigator.clipboard) {
    navigator.clipboard.writeText(ean).then(function() {
      cp.textContent = '✓ Copiado para área de transferência';
      setTimeout(function() { cp.textContent = ''; }, 2000);
    });
  }
  var h = document.getElementById('historico');
  var d = document.createElement('div');
  d.className = 'item';
  d.innerHTML = '<span class="ean">' + ean + '</span><span class="info">SKU ' + (parseInt(skuVal)||0) + ' · ' + new Date().toLocaleTimeString('pt-BR') + '</span>';
  h.prepend(d);
}
document.getElementById('sku').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') gerar();
});
</script>
</body>
</html>
