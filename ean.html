<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Gerador EAN-13 — Fava Ecom</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#0f172a;color:#e2e8f0;min-height:100vh}
nav{background:#1e293b;padding:10px 20px;display:flex;gap:16px;align-items:center;border-bottom:1px solid #334155}
nav a{color:#94a3b8;text-decoration:none;font-size:13px;font-weight:600;padding:6px 12px;border-radius:6px}
nav a:hover,nav a.ativo{background:#3b82f6;color:#fff}
.main{max-width:560px;margin:40px auto;padding:0 16px;text-align:center}
h1{font-size:20px;margin-bottom:6px;color:#f1f5f9}
.sub{font-size:13px;color:#64748b;margin-bottom:36px}
.display{font-size:48px;font-weight:800;letter-spacing:10px;color:#3b82f6;
  background:#1e293b;border-radius:16px;padding:32px 20px;margin-bottom:14px;
  border:2px solid #334155;min-height:116px;display:flex;align-items:center;
  justify-content:center;cursor:pointer;transition:.15s;user-select:all}
.display:hover{border-color:#3b82f6}
.display.ok{border-color:#22c55e;color:#22c55e}
.msg{height:22px;font-size:14px;color:#22c55e;margin-bottom:22px;font-weight:600}
.btn{background:#3b82f6;color:#fff;border:none;border-radius:12px;
  padding:18px;font-size:18px;font-weight:700;cursor:pointer;width:100%;margin-bottom:8px;transition:.15s}
.btn:hover{background:#2563eb}
.hint{font-size:12px;color:#475569;margin-bottom:28px}
.row{display:flex;gap:8px;justify-content:center;margin-bottom:28px;flex-wrap:wrap}
.sm{background:#1e293b;color:#94a3b8;border:1px solid #334155;border-radius:8px;
  padding:7px 14px;font-size:12px;cursor:pointer}
.sm:hover{border-color:#3b82f6;color:#3b82f6}
.htitle{font-size:11px;color:#475569;font-weight:600;text-align:left;margin-bottom:8px;text-transform:uppercase;letter-spacing:1px}
.item{background:#1e293b;border-radius:8px;padding:10px 14px;display:flex;
  justify-content:space-between;align-items:center;border:1px solid #1e3a5f;
  cursor:pointer;margin-bottom:6px}
.item:hover{border-color:#3b82f6}
.cod{font-size:16px;font-weight:700;letter-spacing:3px}
.meta{font-size:11px;color:#475569}
</style>
</head>
<body>
<nav>
  <a href="/painel_fava.html">🏠 Painel</a>
  <a href="/ean.html" class="ativo">🔢 EAN</a>
  <a href="/tarefas.html">📋 Tarefas</a>
  <a href="/base_produtos.html">📦 Base</a>
</nav>
<div class="main">
  <h1>🔢 Gerador EAN-13</h1>
  <p class="sub">Um clique para gerar e copiar — sequencial automático</p>
  <div id="disp" class="display" onclick="gerarECopiar()">—</div>
  <div id="msg" class="msg"></div>
  <button class="btn" onclick="gerarECopiar()">⚡ Gerar próximo EAN</button>
  <p class="hint">Tecla Space ou Enter também gera · Clique no código para copiar novamente</p>
  <div class="row">
    <button class="sm" onclick="resetar()">🔄 Resetar contador</button>
    <button class="sm" onclick="configurar()">⚙️ Prefixo</button>
    <button class="sm" onclick="copiar(ultimo)">📋 Copiar último</button>
  </div>
  <div class="htitle">Histórico</div>
  <div id="hist"></div>
</div>
<script>
var PK='fava_ean_pref', CK='fava_ean_cnt', HK='fava_ean_hist';
var ultimo='';
var hist=JSON.parse(localStorage.getItem(HK)||'[]');

function getPref(){return localStorage.getItem(PK)||'7890001';}
function getCnt(){return parseInt(localStorage.getItem(CK)||'1');}
function setCnt(n){localStorage.setItem(CK,String(n));}

function ean13(pref,seq){
  var d=pref+('00000'+seq).slice(-5);
  var s=0;for(var i=0;i<12;i++)s+=parseInt(d[i])*(i%2===0?1:3);
  return d+String((10-(s%10))%10);
}

function copiar(cod){
  if(!cod)return;
  var el=document.getElementById('disp');
  var msg=document.getElementById('msg');
  function ok(){el.className='display ok';msg.textContent='✓ Copiado: '+cod;setTimeout(function(){el.className='display';msg.textContent='';},2000);}
  if(navigator.clipboard){navigator.clipboard.writeText(cod).then(ok).catch(function(){fb(cod);ok();});}
  else{fb(cod);ok();}
}
function fb(cod){var t=document.createElement('textarea');t.value=cod;document.body.appendChild(t);t.select();document.execCommand('copy');document.body.removeChild(t);}

function gerarECopiar(){
  var seq=getCnt();
  var ean=ean13(getPref(),seq);
  setCnt(seq+1);
  ultimo=ean;
  hist.unshift({e:ean,s:seq,h:new Date().toLocaleTimeString('pt-BR')});
  if(hist.length>50)hist=hist.slice(0,50);
  localStorage.setItem(HK,JSON.stringify(hist));
  document.getElementById('disp').textContent=ean;
  document.getElementById('disp').className='display';
  copiar(ean);
  renderHist();
}

function renderHist(){
  var el=document.getElementById('hist');
  if(!hist.length){el.innerHTML='<div style="color:#475569;font-size:13px;padding:12px;text-align:center">Nenhum gerado ainda</div>';return;}
  el.innerHTML=hist.slice(0,20).map(function(h){
    return '<div class="item" onclick="copiar(\''+h.e+'\')"><span class="cod">'+h.e+'</span><span class="meta">#'+h.s+' · '+h.h+'</span></div>';
  }).join('');
}

function resetar(){if(!confirm('Resetar contador para #1?'))return;setCnt(1);alert('Contador resetado.');}
function configurar(){
  var a=getPref();
  var n=prompt('Prefixo atual: '+a+'\n\nNovo prefixo (7 dígitos):',a);
  if(n===null)return;
  if(!/^\d{7}$/.test(n)){alert('Use exatamente 7 dígitos numéricos');return;}
  localStorage.setItem(PK,n);
  alert('Prefixo salvo: '+n);
}

document.addEventListener('keydown',function(e){if(e.code==='Space'||e.code==='Enter'){e.preventDefault();gerarECopiar();}});
renderHist();
</script>
</body>
</html>
