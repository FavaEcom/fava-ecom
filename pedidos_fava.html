<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pedidos — Fava Ecom</title>
<style>
  :root {
    --bg: #0d1117;
    --bg2: #161b22;
    --bg3: #21262d;
    --border: #30363d;
    --text: #e6edf3;
    --muted: #7d8590;
    --green: #3fb950;
    --red: #f85149;
    --yellow: #d29922;
    --blue: #58a6ff;
    --purple: #bc8cff;
    --orange: #f0883e;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; font-size: 13px; }

  /* NAV */
  nav { background: var(--bg2); border-bottom: 1px solid var(--border); padding: 0 16px; display: flex; align-items: center; gap: 4px; height: 44px; position: sticky; top: 0; z-index: 100; }
  nav a { color: var(--muted); text-decoration: none; padding: 6px 12px; border-radius: 6px; font-size: 13px; transition: all .15s; }
  nav a:hover { color: var(--text); background: var(--bg3); }
  nav a.active { color: var(--text); background: var(--bg3); }
  nav .logo { color: var(--text); font-weight: 600; margin-right: 8px; font-size: 14px; }

  /* HEADER */
  .header { padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
  .header h1 { font-size: 18px; font-weight: 600; flex: 1; }

  /* STATS */
  .stats { display: flex; gap: 1px; background: var(--border); border-bottom: 1px solid var(--border); }
  .stat { flex: 1; background: var(--bg2); padding: 12px 16px; min-width: 120px; }
  .stat .val { font-size: 20px; font-weight: 700; line-height: 1.2; }
  .stat .lbl { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .stat .val.green { color: var(--green); }
  .stat .val.red { color: var(--red); }
  .stat .val.blue { color: var(--blue); }
  .stat .val.yellow { color: var(--yellow); }

  /* FILTROS */
  .filtros { padding: 10px 16px; display: flex; gap: 8px; align-items: center; flex-wrap: wrap; border-bottom: 1px solid var(--border); background: var(--bg2); }
  .filtros select, .filtros input { background: var(--bg3); border: 1px solid var(--border); color: var(--text); padding: 5px 10px; border-radius: 6px; font-size: 12px; height: 30px; }
  .filtros select:focus, .filtros input:focus { outline: none; border-color: var(--blue); }
  .btn { padding: 5px 12px; border-radius: 6px; border: 1px solid var(--border); background: var(--bg3); color: var(--text); cursor: pointer; font-size: 12px; height: 30px; transition: all .15s; }
  .btn:hover { background: var(--border); }
  .btn.primary { background: var(--blue); border-color: var(--blue); color: #000; font-weight: 600; }
  .btn.primary:hover { opacity: .85; }

  /* TABELA */
  .tabela-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; }
  thead th { background: var(--bg2); padding: 8px 10px; text-align: left; font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; border-bottom: 1px solid var(--border); position: sticky; top: 44px; white-space: nowrap; }
  tbody tr { border-bottom: 1px solid var(--border); cursor: pointer; transition: background .1s; }
  tbody tr:hover { background: var(--bg2); }
  tbody td { padding: 8px 10px; white-space: nowrap; }
  .right { text-align: right; }
  .center { text-align: center; }

  /* BADGES */
  .canal-badge { display: inline-flex; align-items: center; gap: 4px; padding: 2px 7px; border-radius: 12px; font-size: 11px; font-weight: 600; }
  .canal-ML { background: #f0c040; color: #000; }
  .canal-Shopee { background: #f05c00; color: #fff; }
  .canal-Yampi { background: #5b4fcf; color: #fff; }
  .canal-Bling { background: #0057a8; color: #fff; }
  .canal-Balcão { background: #3fb950; color: #000; }
  .canal-Balcao { background: #3fb950; color: #000; }

  .uf-badge { display: inline-block; padding: 1px 5px; border-radius: 4px; font-size: 10px; font-weight: 700; background: var(--bg3); color: var(--muted); }
  .uf-difal { background: rgba(248,81,73,.15); color: var(--red); }

  .margem-tag { font-weight: 700; }
  .margem-ok { color: var(--green); }
  .margem-med { color: var(--yellow); }
  .margem-ruim { color: var(--red); }

  /* STATUS */
  .status-dot { width: 7px; height: 7px; border-radius: 50%; display: inline-block; margin-right: 4px; }
  .s-ok { background: var(--green); }
  .s-pend { background: var(--yellow); }
  .s-canc { background: var(--red); }

  /* MODAL */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.75); z-index: 200; align-items: center; justify-content: center; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; width: 760px; max-width: 95vw; max-height: 90vh; overflow: auto; }
  .modal-header { padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
  .modal-header h2 { font-size: 15px; font-weight: 600; }
  .close-btn { background: none; border: none; color: var(--muted); font-size: 20px; cursor: pointer; padding: 2px 8px; border-radius: 4px; }
  .close-btn:hover { color: var(--text); background: var(--bg3); }
  .modal-body { padding: 20px; }

  /* CARDS MODAL */
  .info-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 16px; }
  .info-card { background: var(--bg3); border-radius: 8px; padding: 12px; }
  .info-card .lbl { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 4px; }
  .info-card .val { font-size: 16px; font-weight: 700; }

  /* FISCAL */
  .fiscal-box { background: var(--bg3); border-radius: 8px; padding: 14px; margin-bottom: 12px; }
  .fiscal-box h3 { font-size: 11px; text-transform: uppercase; letter-spacing: .5px; color: var(--muted); margin-bottom: 10px; }
  .fiscal-row { display: flex; justify-content: space-between; align-items: center; padding: 5px 0; border-bottom: 1px solid var(--border); }
  .fiscal-row:last-child { border-bottom: none; }
  .fiscal-row .fiscal-lbl { color: var(--muted); font-size: 12px; }
  .fiscal-row .fiscal-val { font-weight: 600; font-size: 13px; }
  .fiscal-row.total-row { margin-top: 4px; padding-top: 8px; border-top: 1px solid var(--border); border-bottom: none; }
  .fiscal-row.total-row .fiscal-lbl { color: var(--text); font-weight: 600; }
  .fiscal-row.total-row .fiscal-val { color: var(--red); font-size: 15px; }

  /* ITENS */
  .itens-table { width: 100%; border-collapse: collapse; margin-top: 4px; }
  .itens-table th { font-size: 10px; text-transform: uppercase; color: var(--muted); padding: 4px 8px; text-align: left; border-bottom: 1px solid var(--border); }
  .itens-table td { padding: 7px 8px; border-bottom: 1px solid var(--border); font-size: 12px; }
  .itens-table tr:last-child td { border-bottom: none; }

  /* RESULT */
  .result-box { background: var(--bg3); border-radius: 8px; padding: 14px; }
  .result-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
  .result-item { text-align: center; padding: 8px; background: var(--bg2); border-radius: 6px; }
  .result-item .r-lbl { font-size: 10px; color: var(--muted); margin-bottom: 4px; }
  .result-item .r-val { font-size: 15px; font-weight: 700; }

  .loading { text-align: center; padding: 40px; color: var(--muted); }
  .empty { text-align: center; padding: 40px; color: var(--muted); }
  .paginacao { padding: 12px 16px; display: flex; gap: 8px; align-items: center; justify-content: flex-end; border-top: 1px solid var(--border); }
</style>
</head>
<body>

<nav>
  <span class="logo">🛒 Fava Ecom</span>
  <a href="painel_fava.html">Painel</a>
  <a href="gestor_anuncios.html">Gestor</a>
  <a href="balcao_fava.html">Balcão</a>
  <a href="calculadora_fava.html">Calculadora</a>
  <a href="pedidos_fava.html" class="active">Pedidos</a>
</nav>

<div class="header">
  <h1>📦 Pedidos</h1>
  <button class="btn" onclick="sincronizar()">🔄 Sincronizar</button>
</div>

<!-- STATS -->
<div class="stats" id="stats-bar">
  <div class="stat"><div class="val blue" id="s-total">—</div><div class="lbl">Pedidos</div></div>
  <div class="stat"><div class="val green" id="s-receita">—</div><div class="lbl">Receita</div></div>
  <div class="stat"><div class="val" id="s-impostos" style="color:var(--red)">—</div><div class="lbl">Impostos</div></div>
  <div class="stat"><div class="val" id="s-cmv" style="color:var(--orange)">—</div><div class="lbl">CMV</div></div>
  <div class="stat"><div class="val green" id="s-lucro">—</div><div class="lbl">Lucro</div></div>
  <div class="stat"><div class="val" id="s-margem">—</div><div class="lbl">Margem Média</div></div>
  <div class="stat"><div class="val" id="s-difal" style="color:var(--purple)">—</div><div class="lbl">DIFAL Total</div></div>
</div>

<!-- FILTROS -->
<div class="filtros">
  <select id="f-dias" onchange="carregar()">
    <option value="7">7 dias</option>
    <option value="15">15 dias</option>
    <option value="30" selected>30 dias</option>
    <option value="60">60 dias</option>
    <option value="90">90 dias</option>
  </select>
  <select id="f-canal" onchange="carregar()">
    <option value="">Todos os canais</option>
    <option value="ml">Mercado Livre</option>
    <option value="shopee">Shopee</option>
    <option value="yampi">Yampi</option>
    <option value="bling">Bling/Balcão</option>
  </select>
  <select id="f-uf" onchange="carregar()">
    <option value="">Todos os estados</option>
    <option value="PR">PR (sem DIFAL)</option>
    <option value="SP">SP</option>
    <option value="SC">SC</option>
    <option value="RS">RS</option>
    <option value="MG">MG</option>
    <option value="RJ">RJ</option>
  </select>
  <select id="f-tipo" onchange="carregar()">
    <option value="">Tipo cliente</option>
    <option value="PF">PF (com DIFAL)</option>
    <option value="PJ">PJ (sem DIFAL IE)</option>
  </select>
  <input type="text" id="f-busca" placeholder="Buscar pedido/canal..." oninput="filtrarLocal()" style="width:160px">
  <span id="contador" style="color:var(--muted);margin-left:4px"></span>
</div>

<!-- TABELA -->
<div class="tabela-wrap">
<table>
  <thead>
    <tr>
      <th>Data</th>
      <th>Pedido</th>
      <th>Canal</th>
      <th>UF</th>
      <th class="right">Receita</th>
      <th class="right">CMV</th>
      <th class="right">Impostos</th>
      <th class="right">DIFAL</th>
      <th class="right">Lucro</th>
      <th class="right">Margem</th>
      <th>Status</th>
    </tr>
  </thead>
  <tbody id="tbody">
    <tr><td colspan="11" class="loading">Carregando...</td></tr>
  </tbody>
</table>
</div>

<div class="paginacao" id="paginacao"></div>

<!-- MODAL DETALHE -->
<div class="modal-overlay" id="modal" onclick="fecharModal(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-header">
      <h2 id="modal-titulo">Detalhe do Pedido</h2>
      <button class="close-btn" onclick="document.getElementById('modal').classList.remove('open')">✕</button>
    </div>
    <div class="modal-body" id="modal-body">
      <div class="loading">Carregando...</div>
    </div>
  </div>
</div>

<script>
const RAILWAY = 'https://web-production-5aa0f.up.railway.app';
let todos = [];
let filtrados = [];
const POR_PAG = 50;
let pagAtual = 0;

function fmt(v){ return 'R$ '+parseFloat(v||0).toFixed(2).replace('.',',').replace(/\B(?=(\d{3})+(?!\d))/g, '.'); }
function fmtPct(v){ return parseFloat(v||0).toFixed(1)+'%'; }

function canalClass(canal){
  const c = (canal||'').toLowerCase();
  if(c.includes('mercado') || c.includes('ml') || c.includes('meli')) return 'ML';
  if(c.includes('shopee')) return 'Shopee';
  if(c.includes('yampi')) return 'Yampi';
  if(c.includes('balcão') || c.includes('balcao')) return 'Balcao';
  return 'Bling';
}

function canalLabel(canal){
  const cl = canalClass(canal);
  if(cl==='ML') return 'Mercado Livre';
  if(cl==='Shopee') return 'Shopee';
  if(cl==='Yampi') return 'Yampi';
  if(cl==='Balcao') return 'Balcão';
  return canal || 'Bling';
}

function margemClass(m){
  m = parseFloat(m||0);
  if(m >= 15) return 'margem-ok';
  if(m >= 8) return 'margem-med';
  return 'margem-ruim';
}

function statusDot(s){
  const sl = (s||'').toLowerCase();
  if(sl.includes('cancel')) return '<span class="status-dot s-canc"></span>';
  if(sl.includes('entregue') || sl.includes('atendido') || sl.includes('faturado')) return '<span class="status-dot s-ok"></span>';
  return '<span class="status-dot s-pend"></span>';
}

async function carregar(){
  const dias = document.getElementById('f-dias').value;
  document.getElementById('tbody').innerHTML = '<tr><td colspan="11" class="loading">Carregando pedidos...</td></tr>';
  try {
    const res = await fetch(`${RAILWAY}/api/db/pedidos-nf?dias=${dias}`);
    const d = await res.json();
    todos = d.pedidos || d || [];
    filtrarLocal();
    atualizarStats(todos);
  } catch(e) {
    document.getElementById('tbody').innerHTML = '<tr><td colspan="11" class="empty">Erro ao carregar</td></tr>';
  }
}

function filtrarLocal(){
  const canal = document.getElementById('f-canal').value.toLowerCase();
  const uf = document.getElementById('f-uf').value.toUpperCase();
  const tipo = document.getElementById('f-tipo').value.toUpperCase();
  const busca = (document.getElementById('f-busca').value||'').toLowerCase();

  filtrados = todos.filter(p => {
    const cl = canalClass(p.canal).toLowerCase();
    if(canal === 'ml' && !cl.includes('ml')) return false;
    if(canal === 'shopee' && !cl.includes('shopee')) return false;
    if(canal === 'yampi' && !cl.includes('yampi')) return false;
    if(canal === 'bling' && (cl.includes('ml')||cl.includes('shopee')||cl.includes('yampi'))) return false;
    if(uf && (p.uf||'').toUpperCase() !== uf) return false;
    if(busca && !(String(p.id).includes(busca) || (p.canal||'').toLowerCase().includes(busca))) return false;
    return true;
  });

  pagAtual = 0;
  renderizarPagina();
  document.getElementById('contador').textContent = filtrados.length + ' pedidos';
}

function atualizarStats(lista){
  const receita = lista.reduce((s,p)=>s+parseFloat(p.total||0),0);
  const impostos = lista.reduce((s,p)=>s+parseFloat(p.impostos||0),0);
  const cmv = lista.reduce((s,p)=>s+parseFloat(p.cmv||0),0);
  const lucro = lista.reduce((s,p)=>s+parseFloat(p.lucro||0),0);
  const difal = lista.reduce((s,p)=>s+parseFloat(p.difal||0),0);
  const margem = receita > 0 ? lucro/receita*100 : 0;

  document.getElementById('s-total').textContent = lista.length;
  document.getElementById('s-receita').textContent = fmt(receita);
  document.getElementById('s-impostos').textContent = fmt(impostos);
  document.getElementById('s-cmv').textContent = fmt(cmv);
  document.getElementById('s-lucro').textContent = fmt(lucro);
  const mel = document.getElementById('s-margem');
  mel.textContent = fmtPct(margem);
  mel.className = 'val ' + margemClass(margem);
  document.getElementById('s-difal').textContent = fmt(difal);
}

function renderizarPagina(){
  const inicio = pagAtual * POR_PAG;
  const pagina = filtrados.slice(inicio, inicio + POR_PAG);
  const tbody = document.getElementById('tbody');

  if(!pagina.length){
    tbody.innerHTML = '<tr><td colspan="11" class="empty">Nenhum pedido encontrado</td></tr>';
    document.getElementById('paginacao').innerHTML = '';
    return;
  }

  tbody.innerHTML = pagina.map(p => {
    const cl = canalClass(p.canal);
    const ufBadge = p.difal > 0 ? `<span class="uf-badge uf-difal">${p.uf||'?'}</span>` : `<span class="uf-badge">${p.uf||'?'}</span>`;
    const mgClass = margemClass(p.margem);
    return `<tr onclick="abrirModal('${p.id}')">
      <td>${(p.data||'').slice(0,10)}</td>
      <td style="color:var(--blue);font-family:monospace">${p.id}</td>
      <td><span class="canal-badge canal-${cl}">${canalLabel(p.canal)}</span></td>
      <td>${ufBadge}</td>
      <td class="right">${fmt(p.total)}</td>
      <td class="right" style="color:var(--orange)">${p.cmv>0?fmt(p.cmv):'<span style="color:var(--muted)">—</span>'}</td>
      <td class="right" style="color:var(--red)">${fmt(p.impostos)}</td>
      <td class="right" style="color:var(--purple)">${p.difal>0?fmt(p.difal):'<span style="color:var(--muted)">—</span>'}</td>
      <td class="right"><b style="color:${parseFloat(p.lucro)>0?'var(--green)':'var(--red)'}">${fmt(p.lucro)}</b></td>
      <td class="right"><span class="margem-tag ${mgClass}">${fmtPct(p.margem)}</span></td>
      <td>${statusDot(p.status)}${p.status||'—'}</td>
    </tr>`;
  }).join('');

  // Paginação
  const total_pags = Math.ceil(filtrados.length / POR_PAG);
  if(total_pags > 1){
    let pag = `<span style="color:var(--muted)">Pág ${pagAtual+1}/${total_pags}</span>`;
    if(pagAtual > 0) pag += ` <button class="btn" onclick="irPag(${pagAtual-1})">← Anterior</button>`;
    if(pagAtual < total_pags-1) pag += ` <button class="btn" onclick="irPag(${pagAtual+1})">Próxima →</button>`;
    document.getElementById('paginacao').innerHTML = pag;
  } else {
    document.getElementById('paginacao').innerHTML = '';
  }
}

function irPag(p){ pagAtual = p; renderizarPagina(); window.scrollTo(0,0); }

function abrirModal(id){
  const p = todos.find(x=>String(x.id)===String(id));
  if(!p) return;
  document.getElementById('modal-titulo').textContent = `Pedido #${p.id} — ${(p.data||'').slice(0,10)}`;
  const cl = canalClass(p.canal);
  const itens = p.itens || [];
  const temItens = itens.length > 0;

  // Montar corpo do modal
  const body = `
    <div class="info-grid">
      <div class="info-card">
        <div class="lbl">Canal</div>
        <div class="val"><span class="canal-badge canal-${cl}">${canalLabel(p.canal)}</span></div>
      </div>
      <div class="info-card">
        <div class="lbl">Estado (UF)</div>
        <div class="val">${p.uf||'?'} ${p.difal>0?'<span style="color:var(--red);font-size:11px">DIFAL</span>':''}</div>
      </div>
      <div class="info-card">
        <div class="lbl">Status</div>
        <div class="val">${statusDot(p.status)}${p.status||'—'}</div>
      </div>
    </div>

    <div class="fiscal-box">
      <h3>💰 Receita</h3>
      <div class="fiscal-row">
        <span class="fiscal-lbl">Valor dos produtos</span>
        <span class="fiscal-val">${fmt(p.total)}</span>
      </div>
      ${p.frete>0?`<div class="fiscal-row"><span class="fiscal-lbl">Frete recebido</span><span class="fiscal-val">${fmt(p.frete)}</span></div>`:''}
    </div>

    <div class="fiscal-box">
      <h3>📋 Impostos — Lucro Real</h3>
      <div class="fiscal-row">
        <span class="fiscal-lbl">PIS (1,65%)</span>
        <span class="fiscal-val" style="color:var(--red)">- ${fmt(p.pis)}</span>
      </div>
      <div class="fiscal-row">
        <span class="fiscal-lbl">COFINS (7,6%)</span>
        <span class="fiscal-val" style="color:var(--red)">- ${fmt(p.cofins)}</span>
      </div>
      ${p.icms>0?`<div class="fiscal-row">
        <span class="fiscal-lbl">ICMS Interestadual</span>
        <span class="fiscal-val" style="color:var(--red)">- ${fmt(p.icms)}</span>
      </div>`:''}
      ${p.difal>0?`<div class="fiscal-row">
        <span class="fiscal-lbl">DIFAL (${p.uf})</span>
        <span class="fiscal-val" style="color:var(--purple)">- ${fmt(p.difal)}</span>
      </div>`:''}
      ${p.ibs>0?`<div class="fiscal-row">
        <span class="fiscal-lbl">IBS/CBS (2%)</span>
        <span class="fiscal-val" style="color:var(--red)">- ${fmt(p.ibs)}</span>
      </div>`:''}
      <div class="fiscal-row total-row">
        <span class="fiscal-lbl">Total Impostos</span>
        <span class="fiscal-val">- ${fmt(p.impostos)}</span>
      </div>
    </div>

    ${temItens ? `
    <div class="fiscal-box">
      <h3>📦 Itens do Pedido</h3>
      <table class="itens-table">
        <thead><tr><th>SKU</th><th>Produto</th><th class="right">Qtd</th><th class="right">Preço</th><th class="right">CMV un.</th><th class="right">Total</th></tr></thead>
        <tbody>
          ${itens.map(it=>`<tr>
            <td style="color:var(--blue);font-family:monospace">${it.sku||'—'}</td>
            <td>${(it.nome||'').slice(0,40)}</td>
            <td class="right">${it.qtd||1}</td>
            <td class="right">${fmt(it.preco)}</td>
            <td class="right" style="color:var(--orange)">${it.cmv_br?fmt(it.cmv_br):'—'}</td>
            <td class="right">${fmt((it.preco||0)*(it.qtd||1))}</td>
          </tr>`).join('')}
        </tbody>
      </table>
    </div>` : `<div class="fiscal-box" style="text-align:center;color:var(--muted);padding:20px">
      <p>Itens não disponíveis — execute Sincronizar para puxar os itens do Bling</p>
    </div>`}

    <div class="result-box">
      <h3 style="font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin-bottom:12px">📊 Resultado Final</h3>
      <div class="result-grid">
        <div class="result-item">
          <div class="r-lbl">Receita</div>
          <div class="r-val" style="color:var(--blue)">${fmt(p.total)}</div>
        </div>
        <div class="result-item">
          <div class="r-lbl">Impostos</div>
          <div class="r-val" style="color:var(--red)">- ${fmt(p.impostos)}</div>
        </div>
        <div class="result-item">
          <div class="r-lbl">CMV</div>
          <div class="r-val" style="color:var(--orange)">- ${p.cmv>0?fmt(p.cmv):'N/D'}</div>
        </div>
        <div class="result-item">
          <div class="r-lbl">Lucro / Margem</div>
          <div class="r-val ${margemClass(p.margem)}">${fmt(p.lucro)} <small>(${fmtPct(p.margem)})</small></div>
        </div>
      </div>
    </div>
  `;

  document.getElementById('modal-body').innerHTML = body;
  document.getElementById('modal').classList.add('open');
}

function fecharModal(e){
  if(e.target === document.getElementById('modal'))
    document.getElementById('modal').classList.remove('open');
}

async function sincronizar(){
  const btn = event.target;
  btn.disabled = true; btn.textContent = '⏳ Sincronizando...';
  try {
    await fetch(`${RAILWAY}/api/sync/all`);
    await carregar();
  } catch(e){}
  btn.disabled = false; btn.textContent = '🔄 Sincronizar';
}

// Iniciar
carregar();
</script>
</body>
</html>
