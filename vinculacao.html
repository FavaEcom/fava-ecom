<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Vinculação de SKUs — Fava Ecom</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#0f172a;color:#e2e8f0;font-size:12px}
nav{background:#1e293b;padding:6px 16px;display:flex;gap:8px;align-items:center;border-bottom:1px solid #334155;position:sticky;top:0;z-index:50;height:40px;flex-wrap:wrap}
nav a{color:#94a3b8;text-decoration:none;font-size:11px;font-weight:600;padding:4px 8px;border-radius:6px;white-space:nowrap}
nav a:hover,nav a.ativo{background:#3b82f6;color:#fff}
.main{padding:14px 16px}
.toolbar{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:12px}
.toolbar input{background:#0f172a;border:1px solid #475569;border-radius:6px;color:#f1f5f9;padding:6px 10px;font-size:12px;width:180px}
.toolbar input:focus{outline:none;border-color:#3b82f6}
.btn{padding:6px 14px;border-radius:6px;border:none;font-size:12px;font-weight:700;cursor:pointer}
.btn-blue{background:#3b82f6;color:#fff}.btn-blue:hover{background:#2563eb}
.btn-green{background:#16a34a;color:#fff}.btn-green:hover{background:#15803d}
.btn-gray{background:#334155;color:#94a3b8}.btn-gray:hover{color:#fff}
.btn-orange{background:#ea580c;color:#fff}
.badge{background:#1e3a5f;color:#93c5fd;padding:3px 10px;border-radius:4px;font-size:11px;font-weight:700}
/* Stats */
.info-bar{background:#0d1f3c;border:1px solid #1d4ed8;border-radius:8px;padding:10px 16px;margin-bottom:12px;display:flex;gap:20px;align-items:center;flex-wrap:wrap}
.info-bar span{font-size:12px;color:#93c5fd}
.info-bar b{color:#fff}
/* Tabela */
.tbl-wrap{overflow:auto;border-radius:8px;border:1px solid #334155;max-height:calc(100vh - 180px)}
table{width:100%;border-collapse:collapse;min-width:1200px;font-size:11px}
thead th{background:#1a2335;padding:7px 10px;text-align:left;font-size:10px;font-weight:700;color:#94a3b8;text-transform:uppercase;border-bottom:2px solid #334155;white-space:nowrap;position:sticky;top:0;z-index:10}
thead th.num{text-align:right}
tbody tr{border-bottom:1px solid #0f172a}
tbody tr:hover{background:#14202f}
tbody tr.vinculado{opacity:.45}
td{padding:6px 10px;vertical-align:middle}
.cprod-tag{font-family:monospace;color:#64748b;font-size:10px}
.nome-cell{font-weight:500;max-width:260px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.forn-cell{color:#64748b;max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:10px}
.nf-badge{background:#1e293b;color:#94a3b8;padding:1px 6px;border-radius:3px;font-size:10px;font-family:monospace}
/* SKU input group */
.sku-group{display:flex;gap:4px;align-items:center}
.inp-sku{background:#0f172a;border:1px solid #475569;border-radius:5px;color:#fbbf24;padding:4px 8px;font-size:12px;font-weight:700;font-family:monospace;width:80px;outline:none}
.inp-sku:focus{border-color:#f59e0b}
.inp-sku.novo{border-color:#10b981;color:#10b981}
.inp-sku.existente{border-color:#3b82f6;color:#93c5fd}
.inp-nome{background:#0f172a;border:1px solid #334155;border-radius:5px;color:#e2e8f0;padding:4px 8px;font-size:11px;width:220px;outline:none}
.inp-nome:focus{border-color:#3b82f6}
.btn-xs{padding:3px 8px;border-radius:4px;border:none;font-size:10px;font-weight:700;cursor:pointer}
.bxs-green{background:#14532d;color:#86efac}
.bxs-blue{background:#1d4ed8;color:#93c5fd}
.bxs-gray{background:#334155;color:#94a3b8}
/* Radio criar/vincular */
.modo-sel{display:flex;gap:6px;align-items:center}
.modo-sel label{display:flex;align-items:center;gap:3px;font-size:11px;cursor:pointer;padding:3px 8px;border-radius:4px;border:1px solid #334155}
.modo-sel label.ativo{border-color:#10b981;color:#10b981;background:#071411}
.modo-sel input{display:none}
/* Toast */
.toast{position:fixed;top:50px;right:16px;background:#166534;color:#86efac;padding:10px 18px;border-radius:7px;font-size:12px;font-weight:700;z-index:200;display:none;max-width:400px}
.loading{text-align:center;padding:40px;color:#475569}
.tag-ok{background:#14532d;color:#86efac;padding:1px 6px;border-radius:3px;font-size:10px;font-weight:700}
</style>
</head>
<body>
<nav>
  <a href="/painel_fava.html">&#127968; Painel</a>
  <a href="/entrada_nf.html">&#128196; Entrada NF</a>
  <a href="/historico_compras.html">&#128269; Hist&oacute;rico</a>
  <a href="/base_produtos.html">&#128230; Base</a>
  <a href="/vinculacao.html" class="ativo">&#128279; Vincula&ccedil;&atilde;o</a>
  <a href="/gestor_anuncios.html">&#128226; Gestor</a>
  <a href="/calculadora_fava.html">&#128176; Calculadora</a>
</nav>
<div class="main">
<div class="toolbar">
  <input id="busca" type="text" placeholder="Buscar nome ou cprod..." oninput="filtrar()">
  <input id="nf-busca" type="text" placeholder="Filtrar NF..." oninput="filtrar()" style="width:120px">
  <button class="btn btn-blue" onclick="carregar()">&#8635; Recarregar</button>
  <button class="btn btn-green" id="btn-salvar-todos" onclick="salvarTodos()" style="display:none">&#9745; Salvar todos vinculados</button>
  <span class="badge" id="badge">Carregando...</span>
</div>

<div class="info-bar" id="info-bar" style="display:none">
  <span>Pr&oacute;ximo SKU: <b id="lbl-proximo" style="color:#10b981;font-size:14px">—</b></span>
  <span>Pendentes: <b id="lbl-pend" style="color:#f59e0b">—</b></span>
  <span>Vinculados agora: <b id="lbl-vinc" style="color:#10b981">0</b></span>
  <span style="font-size:11px;color:#475569">Duplo clique no SKU para editar &bull; NOVO = cria produto &bull; EXISTENTE = s&oacute; vincula cprod</span>
</div>

<div class="tbl-wrap">
  <div id="conteudo" class="loading">&#9203; Carregando itens sem SKU...</div>
</div>
</div>
<div class="toast" id="toast"></div>

<script>
var _itens=[], _fil=[], _proximoSku=2934, _vinculados=0;

function toast(msg,ok){
  var el=document.getElementById('toast');
  el.textContent=msg; el.style.background=ok===false?'#7f1d1d':'#166534';
  el.style.display='block'; setTimeout(function(){el.style.display='none';},4000);
}

function carregar(){
  document.getElementById('conteudo').innerHTML='<div class="loading">&#9203; Carregando...</div>';
  fetch('/api/db/sem-sku').then(function(r){return r.json();}).then(function(d){
    _itens=d.itens||[];
    _proximoSku=d.proximo_sku||2934;
    document.getElementById('lbl-proximo').textContent=_proximoSku;
    document.getElementById('info-bar').style.display='flex';
    document.getElementById('btn-salvar-todos').style.display='';
    filtrar();
  }).catch(function(e){
    document.getElementById('conteudo').innerHTML='<div class="loading" style="color:#ef4444">Erro: '+e.message+'</div>';
  });
}

function filtrar(){
  var q=document.getElementById('busca').value.toLowerCase();
  var nf=document.getElementById('nf-busca').value.toLowerCase();
  _fil=_itens.filter(function(it){
    if(q&&!(it.nome||'').toLowerCase().includes(q)&&!(it.cprod||'').includes(q))return false;
    if(nf&&!(it.nf||'').toString().includes(nf))return false;
    return true;
  });
  document.getElementById('badge').textContent=_fil.length+' itens';
  document.getElementById('lbl-pend').textContent=_itens.length;
  renderTabela();
}

var _autoSku = {};  // cprod -> sku atribuído
var _nomes = {};    // cprod -> nome editado

function getSkuInput(cprod){ var el=document.getElementById('sku-'+cprod); return el?el.value.trim():''; }
function getNomeInput(cprod){ var el=document.getElementById('nome-'+cprod); return el?el.value.trim():''; }

function renderTabela(){
  if(!_fil.length){
    document.getElementById('conteudo').innerHTML='<div class="loading" style="color:#22c55e">&#10003; Todos vinculados! Nenhum item pendente.</div>';
    return;
  }
  var html='<table><thead><tr>';
  html+='<th>NF</th><th>C&oacute;d Forn (cprod)</th><th style="min-width:260px">Nome do Produto na NF</th>';
  html+='<th>Fornecedor</th><th class="num">Custo Unit</th>';
  html+='<th style="min-width:120px">SKU Fava</th><th style="min-width:230px">Nome no Sistema</th>';
  html+='<th>Modo</th><th>A&ccedil;&atilde;o</th>';
  html+='</tr></thead><tbody>';

  var seq=_proximoSku;
  _fil.forEach(function(it){
    var cprod=it.cprod;
    var jaTem=_autoSku[cprod];
    var skuSugerido=jaTem||String(seq);
    if(!jaTem) seq++;
    var nomeSugerido=_nomes[cprod]||(it.nome||'').toUpperCase().slice(0,60);
    var vinc=jaTem?'vinculado':'';
    html+='<tr class="'+vinc+'" id="row-'+cprod+'">';
    html+='<td><span class="nf-badge">'+esc(String(it.nf||''))+'</span></td>';
    html+='<td><span class="cprod-tag">'+esc(cprod)+'</span></td>';
    html+='<td><div class="nome-cell" title="'+esc(it.nome||'')+'">'+esc((it.nome||'—'))+'</div></td>';
    html+='<td><div class="forn-cell" title="'+esc(it.fornecedor||'')+'">'+esc((it.fornecedor||'—').slice(0,35))+'</div></td>';
    html+='<td class="num" style="font-family:monospace;color:#22c55e">R$ '+(parseFloat(it.custo||0)).toFixed(2)+'</td>';
    // SKU input
    html+='<td><input id="sku-'+cprod+'" class="inp-sku'+(jaTem?' novo':'')+'" value="'+esc(skuSugerido)+'" ';
    html+='oninput="onSkuChange(\''+cprod+'\')" placeholder="SKU" maxlength="20"></td>';
    // Nome input
    html+='<td><input id="nome-'+cprod+'" class="inp-nome" value="'+esc(nomeSugerido)+'" placeholder="Nome do produto"></td>';
    // Modo (novo ou existente)
    var modoAtual=_autoSku['modo_'+cprod]||'novo';
    html+='<td>';
    html+='<div class="modo-sel">';
    html+='<label class="'+(modoAtual==='novo'?'ativo':'')+'" id="lbl-novo-'+cprod+'" onclick="setModo(\''+cprod+'\',\'novo\')">';
    html+='&#10004; NOVO</label>';
    html+='<label class="'+(modoAtual==='existente'?'ativo':'')+'" id="lbl-ex-'+cprod+'" onclick="setModo(\''+cprod+'\',\'existente\')">';
    html+='&#128279; EXISTENTE</label>';
    html+='</div></td>';
    // Ação
    html+='<td>';
    if(jaTem){
      html+='<span class="tag-ok">&#10003; Salvo</span>';
    } else {
      html+='<button class="btn-xs bxs-green" onclick="vincularItem(\''+cprod+'\')">&#10003; Vincular</button> ';
      html+='<button class="btn-xs bxs-gray" onclick="pularItem(\''+cprod+'\')">Pular</button>';
    }
    html+='</td>';
    html+='</tr>';
  });
  html+='</tbody></table>';
  document.getElementById('conteudo').innerHTML=html;
}

function setModo(cprod, modo){
  _autoSku['modo_'+cprod]=modo;
  var lNovo=document.getElementById('lbl-novo-'+cprod);
  var lEx=document.getElementById('lbl-ex-'+cprod);
  if(lNovo) lNovo.className='modo-sel'.replace('modo-sel','')+(modo==='novo'?' ativo':'');
  if(lEx) lEx.className=(modo==='existente'?' ativo':'');
  // Rebuild labels
  if(lNovo) lNovo.className='ativo'===lNovo.className?'ativo':'';
  renderLabels(cprod, modo);
}

function renderLabels(cprod, modo){
  var lNovo=document.getElementById('lbl-novo-'+cprod);
  var lEx=document.getElementById('lbl-ex-'+cprod);
  if(!lNovo||!lEx) return;
  lNovo.className=modo==='novo'?'ativo':'';
  lEx.className=modo==='existente'?'ativo':'';
  var inp=document.getElementById('nome-'+cprod);
  if(inp) inp.disabled=(modo==='existente');
}

function onSkuChange(cprod){
  var val=document.getElementById('sku-'+cprod)?.value.trim()||'';
  // Verificar se SKU existe na base
  if(/^\d{4,}$/.test(val)){
    fetch('/api/db/produto?sku='+val).then(function(r){return r.json();}).then(function(d){
      var inp=document.getElementById('sku-'+cprod);
      if(d&&d.sku){
        if(inp) inp.className='inp-sku existente';
        var nomeInp=document.getElementById('nome-'+cprod);
        if(nomeInp) nomeInp.value=d.nome||'';
        setModo(cprod,'existente');
      } else {
        if(inp) inp.className='inp-sku novo';
        setModo(cprod,'novo');
      }
    }).catch(function(){});
  }
}

function vincularItem(cprod){
  var sku=getSkuInput(cprod);
  var nome=getNomeInput(cprod);
  var modo=_autoSku['modo_'+cprod]||'novo';
  if(!sku){toast('Digite um SKU',false);return;}
  var it=_itens.find(function(x){return x.cprod===cprod;});
  if(!it) return;
  var payload={
    cprod: cprod, sku: sku, nome: nome||it.nome||'',
    custo: it.custo||0, cmv_br: it.cmv_br||0, cmv_pr: it.cmv_pr||0,
    ncm: it.ncm||'', cst: it.cst||'', cest: it.cest||'',
    cfop: it.cfop||'', origem: it.origem||0, ipi_p: it.ipi_p||0,
    tem_st: it.tem_st||0, fornecedor: it.fornecedor||'',
    criar: modo==='novo'
  };
  fetch('/api/db/vincular-sku',{
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify(payload)
  }).then(function(r){return r.json();}).then(function(d){
    if(d.ok){
      _autoSku[cprod]=sku;
      _vinculados++;
      document.getElementById('lbl-vinc').textContent=_vinculados;
      var row=document.getElementById('row-'+cprod);
      if(row) row.className='vinculado';
      var td=row?row.querySelector('td:last-child'):null;
      if(td) td.innerHTML='<span class="tag-ok">&#10003; Salvo</span>';
      toast('&#10003; '+cprod+' vinculado ao SKU '+sku+(d.criados?'  (produto criado)':''));
    } else {
      toast('Erro: '+(d.error||'falha'),false);
    }
  }).catch(function(e){toast('Erro: '+e.message,false);});
}

function pularItem(cprod){
  var row=document.getElementById('row-'+cprod);
  if(row){row.style.opacity='0.3';}
}

function salvarTodos(){
  var pendentes=_fil.filter(function(it){return !_autoSku[it.cprod];});
  if(!pendentes.length){toast('Nenhum pendente!');return;}
  var seq=_proximoSku;
  var payload=pendentes.map(function(it){
    var sku=getSkuInput(it.cprod)||String(seq++);
    var nome=getNomeInput(it.cprod)||(it.nome||'').toUpperCase().slice(0,60);
    var modo=_autoSku['modo_'+it.cprod]||'novo';
    return {
      cprod:it.cprod, sku:sku, nome:nome,
      custo:it.custo||0, cmv_br:it.cmv_br||0, cmv_pr:it.cmv_pr||0,
      ncm:it.ncm||'', cst:it.cst||'', cest:it.cest||'',
      cfop:it.cfop||'', origem:it.origem||0, ipi_p:it.ipi_p||0,
      tem_st:it.tem_st||0, fornecedor:it.fornecedor||'',
      criar: modo==='novo'
    };
  });
  if(!confirm('Vincular '+payload.length+' itens? SKUs de '+payload[0].sku+' a '+payload[payload.length-1].sku))return;
  fetch('/api/db/vincular-sku',{
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify(payload)
  }).then(function(r){return r.json();}).then(function(d){
    if(d.ok){
      toast('&#10003; '+d.salvos+' vinculados, '+d.criados+' produtos criados!');
      setTimeout(carregar, 1500);
    }
  }).catch(function(e){toast('Erro: '+e.message,false);});
}

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

// Carregar ao abrir
carregar();
</script>
</body>
</html>
