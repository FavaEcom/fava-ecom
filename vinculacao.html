<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Vinculacao de SKUs - Fava Ecom</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#07101f;color:#e2e8f0;min-height:100vh}
.nav{background:#0f1e35;border-bottom:1px solid #1e3a5f;padding:10px 16px;display:flex;gap:12px;align-items:center;flex-wrap:wrap}
.nav a{color:#94a3b8;text-decoration:none;font-size:12px;padding:4px 8px;border-radius:4px}
.nav a:hover{color:#e2e8f0;background:#1e3a5f}
.nav a.ativo{color:#93c5fd;background:#1e3a5f}
.barra{background:#0f1e35;border-bottom:1px solid #1e3a5f;padding:10px 16px;display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.barra input{background:#0d1e35;border:1px solid #1e3a5f;color:#e2e8f0;padding:6px 10px;border-radius:6px;font-size:12px;width:200px}
.btn{padding:6px 14px;border-radius:6px;border:none;cursor:pointer;font-size:12px;font-weight:700}
.btn-blue{background:#1d4ed8;color:#fff}
.btn-green{background:#15803d;color:#fff}
.btn-gray{background:#334155;color:#94a3b8}
.btn-orange{background:#c2410c;color:#fff}
.stat{font-size:11px;color:#64748b;margin-left:auto}
.conteudo{padding:16px;overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:11px}
th{text-align:left;padding:6px 8px;color:#64748b;font-size:10px;text-transform:uppercase;border-bottom:1px solid #1e3a5f;white-space:nowrap}
td{padding:6px 8px;border-bottom:1px solid #0d1a2d;vertical-align:middle}
tr:hover td{background:#0d1e35}
.cprod{font-family:monospace;color:#f59e0b;font-size:10px}
.nome-cell{max-width:220px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.forn-cell{max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:#64748b}
.inp-sku{width:80px;background:#0d1e35;border:1px solid #1e3a5f;color:#e2e8f0;padding:4px 6px;border-radius:4px;font-size:11px}
.inp-nome{width:200px;background:#0d1e35;border:1px solid #1e3a5f;color:#e2e8f0;padding:4px 6px;border-radius:4px;font-size:11px}
.inp-sku:focus,.inp-nome:focus{outline:none;border-color:#3b82f6}
.tag-ok{background:#14532d;color:#86efac;padding:1px 6px;border-radius:3px;font-size:10px;font-weight:700}
.loading{text-align:center;padding:40px;color:#475569}
.pag{display:flex;align-items:center;gap:6px;padding:10px 16px;background:#0f1e35;border-top:1px solid #1e3a5f}
.pag span{color:#64748b;font-size:11px}
.pag-btn{padding:4px 10px;background:#1e293b;border:1px solid #334155;color:#94a3b8;border-radius:4px;cursor:pointer;font-size:11px}
.pag-btn:hover,.pag-btn.ativo{background:#1d4ed8;color:#fff;border-color:#1d4ed8}
.toast{position:fixed;bottom:20px;right:20px;background:#166534;color:#86efac;padding:10px 18px;border-radius:8px;font-size:12px;font-weight:700;display:none;z-index:999}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;align-items:center;justify-content:center}
.modal-bg.open{display:flex}
.modal{background:#0f1e35;border:1px solid #1e3a5f;border-radius:12px;padding:24px;width:500px;max-width:95vw}
.modal h3{font-size:15px;font-weight:800;margin-bottom:16px;color:#93c5fd}
.form-row{display:flex;flex-direction:column;gap:4px;margin-bottom:12px}
.form-row label{font-size:10px;color:#64748b;text-transform:uppercase;font-weight:700}
.form-row input,.form-row select,.form-row textarea{background:#0d1e35;border:1px solid #1e3a5f;color:#e2e8f0;padding:7px 10px;border-radius:6px;font-size:12px}
.form-row input:focus,.form-row select:focus{outline:none;border-color:#3b82f6}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.tipo-btns{display:flex;gap:8px;flex-wrap:wrap}
.tipo-btn{padding:6px 14px;border:1px solid #334155;background:#1e293b;color:#94a3b8;border-radius:6px;cursor:pointer;font-size:11px;font-weight:700}
.tipo-btn.sel{background:#1d4ed8;color:#fff;border-color:#1d4ed8}
</style>
</head>
<body>

<nav class="nav">
  <a href="/home_fava.html">Painel</a>
  <a href="/entrada_nf.html">Entrada NF</a>
  <a href="/historico_compras.html">Historico</a>
  <a href="/base_produtos.html">Base</a>
  <a href="/vinculacao.html" class="ativo">Vinculacao</a>
  <a href="/gestor_anuncios.html">Gestor</a>
  <a href="/calculadora_fava.html">Calculadora</a>
</nav>

<div class="barra">
  <button class="btn btn-blue" onclick="carregar()">Recarregar</button>
  <input id="inp-busca" placeholder="Buscar nome ou cprod..." oninput="filtrar()">
  <input id="inp-nf" placeholder="Filtrar NF..." oninput="filtrar()">
  <select id="inp-forn" onchange="filtrar()" style="background:#0d1e35;border:1px solid #1e3a5f;color:#e2e8f0;padding:6px 10px;border-radius:6px;font-size:12px;min-width:200px">
    <option value="">Todos os fornecedores</option>
  </select>
  <div class="stat" id="stat">Carregando...</div>
</div>

<div id="conteudo" class="conteudo">
  <div class="loading">Carregando itens sem SKU...</div>
</div>

<div class="pag" id="pag" style="display:none"></div>

<div class="toast" id="toast"></div>

<!-- Modal cadastro produto -->
<div class="modal-bg" id="modal">
  <div class="modal">
    <h3>Cadastrar Produto + Vincular SKU</h3>
    <div class="form-row">
      <label>Tipo de produto</label>
      <div class="tipo-btns">
        <div class="tipo-btn sel" onclick="setTipo('un',this)">Unitario</div>
        <div class="tipo-btn" onclick="setTipo('var',this)">Variacao</div>
        <div class="tipo-btn" onclick="setTipo('kit',this)">Kit</div>
        <div class="tipo-btn" onclick="setTipo('cx',this)">Caixa/Pacote</div>
        <div class="tipo-btn" onclick="setTipo('uso',this)">Uso Interno</div>
      </div>
    </div>
    <div class="form-grid">
      <div class="form-row">
        <label>SKU (gerado automatico)</label>
        <input id="m-sku" placeholder="ex: 2934">
      </div>
      <div class="form-row">
        <label>Fator embalagem</label>
        <input id="m-fator" type="number" value="1" min="1" placeholder="1 = unitario, 5 = cx/5">
      </div>
    </div>
    <div class="form-row">
      <label>Nome do produto</label>
      <input id="m-nome" placeholder="Nome em maiusculas">
    </div>
    <div id="var-extra" style="display:none">
      <div class="form-row">
        <label>Variacoes (uma por linha: SKU|Nome)</label>
        <textarea id="m-vars" rows="3" placeholder="2934|CADEIRA AZUL&#10;2935|CADEIRA VERMELHA"></textarea>
      </div>
    </div>
    <div class="form-row">
      <label>Cprod (codigo fornecedor)</label>
      <input id="m-cprod" readonly style="color:#f59e0b">
    </div>
    <div style="display:flex;gap:8px;margin-top:16px">
      <button class="btn btn-green" onclick="salvarCadastro()">Salvar e Vincular</button>
      <button class="btn btn-gray" onclick="fecharModal()">Cancelar</button>
    </div>
    <div id="m-erro" style="color:#ef4444;font-size:11px;margin-top:8px"></div>
  </div>
</div>

<script>
var _itens = [];
var _fil = [];
var _pag = 0;
var _porPag = 50;
var _prox = 2934;
var _tipo = 'un';
var _cprodAtual = '';

function toast(msg, ok) {
  var el = document.getElementById('toast');
  el.textContent = msg;
  el.style.background = (ok === false) ? '#7f1d1d' : '#166534';
  el.style.display = 'block';
  setTimeout(function() { el.style.display = 'none'; }, 4000);
}

function carregar() {
  document.getElementById('conteudo').innerHTML = '<div class="loading">Carregando...</div>';
  document.getElementById('pag').style.display = 'none';
  fetch('/api/db/sem-sku')
    .then(function(r) { return r.json(); })
    .then(function(d) {
      _itens = d.itens || [];
      _prox = d.proximo_sku || 2934;
      _pag = 0;
      popularFornecedores();
      filtrar();
    })
    .catch(function(e) {
      document.getElementById('conteudo').innerHTML = '<div class="loading" style="color:#ef4444">Erro: ' + e.message + '</div>';
    });
}

function popularFornecedores() {
  var sel = document.getElementById('inp-forn');
  var fSet = {};
  _itens.forEach(function(it) { if(it.fornecedor) fSet[it.fornecedor] = true; });
  var forns = Object.keys(fSet).sort();
  var html = '<option value="">Todos os fornecedores (' + _itens.length + ')</option>';
  forns.forEach(function(f) {
    var cnt = _itens.filter(function(it){ return it.fornecedor === f; }).length;
    html += '<option value="' + f.replace(/"/g,'&quot;') + '">' + f.slice(0,40) + ' (' + cnt + ')</option>';
  });
  sel.innerHTML = html;
}

function filtrar() {
  var busca = (document.getElementById('inp-busca').value || '').toLowerCase();
  var nf = (document.getElementById('inp-nf').value || '').toLowerCase();
  var forn = document.getElementById('inp-forn').value || '';
  _fil = _itens.filter(function(it) {
    var ok = true;
    if (busca) ok = ok && ((it.nome||'').toLowerCase().includes(busca) || (it.cprod||'').toLowerCase().includes(busca));
    if (nf) ok = ok && String(it.nf||'').toLowerCase().includes(nf);
    if (forn) ok = ok && (it.fornecedor||'') === forn;
    return ok;
  });
  _pag = 0;
  renderizar();
}

function renderizar() {
  var total = _fil.length;
  var totalPags = Math.ceil(total / _porPag);
  var ini = _pag * _porPag;
  var fim = Math.min(ini + _porPag, total);
  var pagItens = _fil.slice(ini, fim);

  document.getElementById('stat').textContent = total + ' itens sem SKU | proximo: ' + _prox;

  if (!total) {
    document.getElementById('conteudo').innerHTML = '<div class="loading" style="color:#22c55e">Todos os itens ja tem SKU!</div>';
    document.getElementById('pag').style.display = 'none';
    return;
  }

  var html = '<table><thead><tr>';
  html += '<th>NF</th><th>Cod Forn (cprod)</th><th>Nome na Nota</th><th>Fornecedor</th><th>Custo</th><th>NCM</th><th>SKU Fava</th><th>Nome Sistema</th><th>Acao</th>';
  html += '</tr></thead><tbody>';

  var seq = _prox;
  for (var i = 0; i < pagItens.length; i++) {
    var it = pagItens[i];
    var cprod = it.cprod || '';
    var idCprod = 'c_' + cprod.replace(/[^a-zA-Z0-9]/g, '_');
    html += '<tr id="row-' + idCprod + '">';
    html += '<td><span style="background:#1e3a5f;color:#93c5fd;padding:1px 6px;border-radius:3px;font-size:10px">' + esc(String(it.nf||'')) + '</span></td>';
    html += '<td><span class="cprod">' + esc(cprod) + '</span></td>';
    html += '<td><div class="nome-cell" title="' + esc(it.nome||'') + '">' + esc(it.nome||'--') + '</div></td>';
    html += '<td><div class="forn-cell">' + esc((it.fornecedor||'--').slice(0,30)) + '</div></td>';
    var custoUnit = parseFloat(it.custo||0) / Math.max(parseFloat(it.qtd||1), 1);
    html += '<td style="font-family:monospace;color:#22c55e" title="Total: R$' + parseFloat(it.custo||0).toFixed(2) + ' | Qtd: ' + (it.qtd||1) + '">R$' + custoUnit.toFixed(2) + '</td>';
    html += '<td style="font-family:monospace;font-size:10px;color:#64748b">' + esc(it.ncm||'') + '</td>';
    html += '<td><input class="inp-sku" id="sku-' + idCprod + '" value="' + seq + '" placeholder="SKU"></td>';
    html += '<td><input class="inp-nome" id="nome-' + idCprod + '" value="' + esc((it.nome||'').toUpperCase().slice(0,60)) + '" placeholder="Nome"></td>';
    html += '<td style="white-space:nowrap">';
    html += '<button class="btn btn-green" style="font-size:10px;padding:3px 8px;margin-right:4px" onclick="vincularRapido(\'' + idCprod + '\',\'' + cprod.replace(/'/g,"\\'") + '\')">Vincular</button>';
    html += '<button class="btn btn-blue" style="font-size:10px;padding:3px 8px" onclick="abrirCadastro(\'' + cprod.replace(/'/g,"\\'") + '\',' + seq + ',\'' + esc(it.nome||'').replace(/'/g,"\\'") + '\')">Cadastrar</button>';
    html += '</td>';
    html += '</tr>';
    seq++;
  }
  html += '</tbody></table>';
  document.getElementById('conteudo').innerHTML = html;

  // Paginacao
  var pagEl = document.getElementById('pag');
  if (totalPags > 1) {
    var pHtml = '<span>' + total + ' itens | Pag ' + (_pag+1) + '/' + totalPags + '</span>';
    pHtml += '<div style="margin-left:auto;display:flex;gap:4px">';
    if (_pag > 0) pHtml += '<div class="pag-btn" onclick="_pag--;renderizar()">Anterior</div>';
    var p0 = Math.max(0, _pag-2), p1 = Math.min(totalPags-1, _pag+2);
    for (var pg = p0; pg <= p1; pg++) {
      var a = (pg === _pag) ? ' ativo' : '';
      pHtml += '<div class="pag-btn' + a + '" onclick="_pag=' + pg + ';renderizar()">' + (pg+1) + '</div>';
    }
    if (_pag < totalPags-1) pHtml += '<div class="pag-btn" onclick="_pag++;renderizar()">Proxima</div>';
    pHtml += '</div>';
    pagEl.innerHTML = pHtml;
    pagEl.style.display = 'flex';
  } else {
    pagEl.style.display = 'none';
  }
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function vincularRapido(idCprod, cprod) {
  var sku = document.getElementById('sku-' + idCprod).value.trim();
  var nome = document.getElementById('nome-' + idCprod).value.trim();
  if (!sku) { toast('Informe o SKU', false); return; }
  fetch('/api/db/vincular-sku', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({cprod: cprod, sku: sku, nome: nome, criar: true})
  }).then(function(r) { return r.json(); }).then(function(d) {
    if (d.ok) {
      var row = document.getElementById('row-' + idCprod);
      if (row) { row.cells[row.cells.length-1].innerHTML = '<span class="tag-ok">OK ' + sku + '</span>'; }
      _itens = _itens.filter(function(it) { return it.cprod !== cprod; });
      _fil = _fil.filter(function(it) { return it.cprod !== cprod; });
      document.getElementById('stat').textContent = _fil.length + ' itens sem SKU | proximo: ' + _prox;
      toast('Vinculado: ' + cprod + ' -> ' + sku);
    } else {
      toast('Erro: ' + (d.error||'falha'), false);
    }
  }).catch(function(e) { toast('Erro: ' + e.message, false); });
}

// === MODAL CADASTRO ===
function setTipo(tipo, el) {
  _tipo = tipo;
  document.querySelectorAll('.tipo-btn').forEach(function(b) { b.classList.remove('sel'); });
  el.classList.add('sel');
  document.getElementById('var-extra').style.display = (tipo === 'var') ? 'block' : 'none';
}

function abrirCadastro(cprod, sku, nome) {
  _cprodAtual = cprod;
  document.getElementById('m-cprod').value = cprod;
  document.getElementById('m-sku').value = sku;
  document.getElementById('m-nome').value = nome;
  document.getElementById('m-fator').value = 1;
  document.getElementById('m-erro').textContent = '';
  document.getElementById('modal').classList.add('open');
}

function fecharModal() {
  document.getElementById('modal').classList.remove('open');
}

function salvarCadastro() {
  var cprod = _cprodAtual;
  var sku = document.getElementById('m-sku').value.trim();
  var nome = document.getElementById('m-nome').value.trim();
  var fator = parseInt(document.getElementById('m-fator').value) || 1;
  var tipo = _tipo;

  if (!sku || !nome) {
    document.getElementById('m-erro').textContent = 'SKU e Nome sao obrigatorios';
    return;
  }

  if (tipo === 'uso') {
    // Marcar como uso interno - apenas adiciona no cprod_map sem criar produto de venda
    fetch('/api/db/vincular-sku', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({cprod: cprod, sku: 'USO_INTERNO', nome: nome, criar: false})
    }).then(function(r) { return r.json(); }).then(function(d) {
      fecharModal();
      toast('Marcado como uso interno');
      carregar();
    }).catch(function(e) { document.getElementById('m-erro').textContent = e.message; });
    return;
  }

  if (tipo === 'var') {
    // Salvar multiplas variacoes
    var linhas = (document.getElementById('m-vars').value || '').split('\n').filter(function(l) { return l.trim(); });
    if (!linhas.length) { document.getElementById('m-erro').textContent = 'Informe as variacoes'; return; }
    var promises = linhas.map(function(linha) {
      var partes = linha.split('|');
      var vSku = (partes[0]||'').trim();
      var vNome = (partes[1]||nome).trim();
      return fetch('/api/db/vincular-sku', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({cprod: cprod, sku: vSku, nome: vNome, criar: true, fator_embalagem: 1})
      }).then(function(r) { return r.json(); });
    });
    Promise.all(promises).then(function() {
      fecharModal();
      toast('Variacoes criadas!');
      carregar();
    }).catch(function(e) { document.getElementById('m-erro').textContent = e.message; });
    return;
  }

  // Produto normal, caixa ou kit
  fetch('/api/db/vincular-sku', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({cprod: cprod, sku: sku, nome: nome, criar: true, fator_embalagem: fator})
  }).then(function(r) { return r.json(); }).then(function(d) {
    if (d.ok) {
      fecharModal();
      toast('Produto cadastrado e vinculado: ' + sku);
      carregar();
    } else {
      document.getElementById('m-erro').textContent = d.error || 'Erro ao salvar';
    }
  }).catch(function(e) { document.getElementById('m-erro').textContent = e.message; });
}

// Fechar modal clicando fora
document.getElementById('modal').addEventListener('click', function(e) {
  if (e.target === this) fecharModal();
});

carregar();
</script>
</body>
</html>
